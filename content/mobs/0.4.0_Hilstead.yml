WhiteWarrior:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cWhite Warrior'
  Health: 2000
  Damage: 21
  Faction: Boss
  Modules:
    ThreatTable: true
  DamageModifiers:
  - FALL 0
  - LIGHTNING 0
  Equipment:
  - IRON_SWORD HAND
  - SHIELD OFFHAND
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lWhite Warrior'
    Health: 2000
    Range: 30
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    FollowRange: 25
    NoDamageTicks: 0
    Silent: true
  Skills:
  - skill{s=WhiteWarrior-drop} @trigger ~onDeath
  - skill{s=WhiteWarriortarget} @target ~onTimer:240
  - skill{s=WhiteWarriorself} @NearestPlayer{r=32} ~onTimer:40
  - skill{s=WhiteWarriorself} @self ~onTimer:40 <40%
  - skill{s=WhiteWarriorself2} @self ~onTimer:40 <60%
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin Apostoll_ setCustomName "&e[&6☠&e] &cWhite Warrior" setDynamicName true
WhiteWarriorMarker:
  Type: armor_stand
  Options:
    Invisible: true
    HasGravity: true
    Marker: true
  Skills:
  - effect:particlesphere{p=item_snowball;amount=5;radius=5} @self ~onTimer:4
