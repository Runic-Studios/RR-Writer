ColdsteelCommander:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cColdsteel Commander'
  Health: 2000
  Damage: 34
  DamageModifiers:
  - FALL 0
  Faction: Boss
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lColdsteel Commander'
    Health: 2000
    Range: 20
    Color: RED
    Style: SEGMENTED_10
  Modules:
    ThreatTable: true
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.24
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - skill{s=ColdsteelCommander-drop} @trigger ~onDeath
  - skill{s=coldsteel-peak-boss-skill} @self ~onTimer:40 .25
  - skill{s=coldsteel-peak-boss-passive} @self ~onTimer:5 <50%
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin FrozedCode setCustomName "&e[&6☠&e] &cColdsteel Commander" setDynamicName true

