#---------------------------------------
# Raids are 10-man multi-day boss fights
#---------------------------------------

BossKill:
  Type: armor_stand
  Display: '&eThis boss has been defeated'
  Health: 1
  Options:
    Invincible: true
  BossBar:
    Enabled: true
    Title: '&1&lClick me to see the Boss Killer!'
    Range: 20
    Color: BLUE
    Style: SEGMENTED_10
  Skills:
  #- skill{s=SpawnWithCustomisableBossBar} @self ~onSpawn
  #- skill{s=CreateKillBossBar} @self ~onInteract
  #- setvariable{var=caster.killClaimed;type=STRING;value="false"} @self ~onSpawn
  #- skill{s=BecomeKillOwner} @trigger ~onInteract
  #- setowner @trigger ~onInteract
  - skill{s=DisplayOwner} @trigger ~onInteract
  - setvariable{var=caster.ownerName;type=STRING;value="NONE";save=true} @self ~onSpawn

# ----------------------------------------------
# FIRST SEMIBOSS
# ----------------------------------------------
Holmgeir:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cHolmgeir the Oathbreaker'
  Health: 25000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 250
  BossBar:
    Enabled: true
    Title: '&c&lHolmgeir'
    Range: 50
    Color: RED
    Style: SEGMENTED_10
  Equipment:
  - IceAxe HAND
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.335
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 50
    NoDamageTicks: 0
  Skills:
  - command{c="ri drop HolmgeirKey <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 1
  #- randomskill{s=ar1,ar2,ar3} @trigger ~onDeath 1
  - effect:sound{s=entity.player.hurt;volume=1.0;pitch=0.5} @PlayersInRadius{r=50}
  - skill{s=chooseSkill_Holmgeir} @self ~onTimer:600
  - skill{s=chooseSkill_HolmgeirCoolAsIce} @self ~onTimer:600
  - setstance{stance=normal} @self ~onSpawn
  - setstance{stance=coolAsIce} @self ~onDamaged =1%-50% #"cool as ice" stage
  - skill{s=coolAsIcePassive} @self ~onTimer:10
  - skill{s=CheckPlayerDeath} @target ~onTimer:200
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin ImLeoOo setCustomName "&e[&6☠&e] &cHolmgeir the Oathbreaker" setDynamicName true

