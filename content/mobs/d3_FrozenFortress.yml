# ----------------------------------------------
# FINAL BOSS
# ----------------------------------------------
Eldrid:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cEldrid the Betrayer'
  Health: 250000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 215
  DamageModifiers:
  - FALL 0
  BossBar:
    Enabled: true
    Title: '&c&lEldrid'
    Health: 250000
    Range: 50
    Color: RED
    Style: SEGMENTED_10
  Equipment:
  - IceMace HAND
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.01
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 50
    NoDamageTicks: 0
    RepeatAllSkills: false
  Skills:
  - skill{s=EldridCrystalSpawn1} @self ~onTimer:20
  - skill{s=EldridGolemSummon1} @self ~onTimer:20
  - skill{s=EldridGolemSpawn1} @self ~onTimer:20
  - skill{s=EldridMinionSummon} @self ~onTimer:20
  - skill{s=EldridMinionSummon1} @self ~onTimer:20
  - skill{s=chooseSkill_Eldrid} @self ~onTimer:600
  - skill{s=EldridPassive} @self ~onTimer:320
  - skill{s=EldridPassiveBuff} @self ~onSignal:runeSpawn
  - setstance{stance=normal} @self ~onSpawn
  - velocity{m=set;x=0;y=0;z=0} @self ~onDamaged
  - skill{s=CheckPlayerDeath} @target ~onTimer:200
  # RESET PARTY
  - command{c="runicteleport <trigger.name> fortress"} @trigger ~onDeath 1.0
  - command{c="party teleport <trigger.name>"} @trigger ~onDeath 1.0
  - skill{s=BossFirework} @trigger ~onDeath
  # DROPS
  - command{c="runicboss <caster.uuid> fortress"} @self ~onDeath 1.0
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin adaydremer setCustomName "&e[&6☠&e] &cEldrid the Betrayer" setDynamicName true

