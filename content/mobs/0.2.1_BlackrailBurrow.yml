UndeadMiner:
  Type: ZOMBIE
  Display: '&e[&68&e] &cUndead Miner'
  Health: 155
  Damage: 18
  DamageModifiers:
  - FALL 0
  Faction: Undead
  Equipment:
  - IRON_PICKAXE HAND
  Modules:
    ThreatTable: true
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - command{c="runicgive exp <trigger.name> 80 <mob.l.x> <mob.l.y> <mob.l.z> 8"} @trigger ~onDeath 1.0
  - randomskill{s=g1,g2} @trigger ~onDeath .3
  - skill{s=drop-level-8} @trigger ~onDeath
  - command{c="ri drop undead-bread <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 0.2
#  - message{m="<caster.var.tnt>"} @PIR{r=10} ~onTimer:20
  - setvariable{var=caster.tnt;value=0} @self ~onSpawn
  - skill{s=UndeadMinerTNTcheckwithin} @self ~onTimer:20
  - skill{s=UndeadMinerTNTchecknotwithin} @self ~onTimer:20
  - skill{s=UndeadMinerTNT} @self ~onTimer:20
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Disguise: player Steve setSkin minecarr setDynamicName true
    
UndeadMinerTNT:
  Type: BABY_ZOMBIE
  Display: '&6Boom Boom Box'
  Health: 1
  Options:
    MovementSpeed: 0.01
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    NoDamageTicks: 0
    Silent: true
  Skills:
  - skill{s=UndeadMinerTNTIgnite} @self ~onSpawn
  - skill{s=UndeadMinerTNTDeath} @self ~onDeath
  AIGoalSelectors:
  - 0 clear
  AITargetSelectors:
  - 0 clear
  Disguise: FALLING_BLOCK TNT
    
UndeadMinerEliteRoot:
  Type: armor_stand
  Skills:
  - potion{t=SLOW;duration=20;l=2} @PIR{r=2} ~onTimer:2
  - sound{s=block.grass.place} @self ~onSpawn
  - sound{s=block.grass.break} @self ~onDespawn
  - remove{delay=60} @self ~onSpawn
  - remove @self ~onInteract
  Options:
    Invisible: true
    HasGravity: false
    Marker: true
  Disguise: FALLING_BLOCK OAK_LEAVES
        
