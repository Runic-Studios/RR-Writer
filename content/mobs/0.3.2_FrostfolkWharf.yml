FrostfolkFisherman: #event
  Type: ZOMBIE
  Display: '&e[&614&e] &cFrostfolk Fisherman'
  Health: 245
  Damage: 28
  DamageModifiers:
  - FALL 0
  Equipment:
  - FISHING_ROD HAND
  Modules:
    ThreatTable: true
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 10
    NoDamageTicks: 0
  Skills:
  - command{c="runicgive exp <trigger.name> 125 <mob.l.x> <mob.l.y> <mob.l.z> 14"} @trigger ~onDeath 1.0
  - randomskill{s=g1,g2,g3} @trigger ~onDeath .3
  - skill{s=drop-level-14} @trigger ~onDeath
  - command{c="ri drop FrozenFish <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 0.25
  - setvariable{var=caster.cast;value=0} @self ~onSpawn
  - skill{s=FrostfolkFisherman} @self ~onTimer:20
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Disguise: player Steve setSkin TinyCookiez setCustomName "&e[&614&e] &cFrostfolk Fisherman" setDynamicName true
Frostfolk-marker:
  Type: armor_stand
  Skills:
  - skill{s=Frostfolk-marker} @self ~onSpawn
  Options:
    Invisible: true
    HasGravity: false
    Marker: true

