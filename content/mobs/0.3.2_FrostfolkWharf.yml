FrostfolkSpirit:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cFrostfolk Spirit'
  Health: 1000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 14
  DamageModifiers:
  - FALL 0
  Equipment:
  - LostRuneblade HAND
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lVaraya the Frostfolk Spirit'
    Health: 1000
    Range: 20
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    FollowRange: 20
    NoDamageTicks: 0
  Skills:
  - skill{s=FrostfolkSpirit-drop} @trigger ~onDeath
  - skill{s=Frostfolk} @self ~onTimer:40
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin soulzie setCustomName "&e[&6☠&e] &cFrostfolk Spirit" setDynamicName true

