LomiElder:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cLomi Elder'
  Health: 5000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 45
  DamageModifiers:
  - FALL 0
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lLomi Elder'
    Health: 4000
    Range: 30
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.24
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - skill{s=LomiElder-drop} @trigger ~onDeath
  - effect:particlesphere{p=squid_ink;a=10;r=8;yOffset=.5} @self ~onTimer:1
  - skill{s=wisperwood-boss-leap} @self ~onTimer:20 .15
  - skill{s=wisperwood-boss-passive} @self ~onTimer:20
  - skill{s=wisperwood-boss-summon-marker} @self ~onTimer:20 <50%
  - setvariable{var=caster.passive;v=1} @self ~onSpawn
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin BienBienXu setCustomName "&e[&6☠&e] &cLomi Elder" setDynamicName true
wisperwood-boss-marker:
  Type: armor_stand
  Skills:
  - skill{s=wisperwood-boss-marker} @self ~onSpawn
  Options:
    Invisible: true
    HasGravity: false
    Marker: true

