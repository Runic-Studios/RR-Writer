  Skills:
  - summon{type=NaheenCitizen;amount=4;radius=32;yRadius=3;os=true} @self ~onSpawn
  - summon{type=NaheenCitizen2;amount=4;radius=32;yRadius=3;os=true} @self ~onSpawn
