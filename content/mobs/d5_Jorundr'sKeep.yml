    Type: HUSK
    Display: '&e[&6☠&e] &cJorundr'
    Health: 5000
    Damage: 25
    DamageModifiers:
    - FALL 0
    Equipment:
    - OdinsWrath HAND
    Faction: Boss
    Modules:
        ThreatTable: true
    BossBar:
        Enabled: true
        Title: '&c&lJorundr the Unconquered'
        Health: 6000
        Range: 32
        Color: RED
        Style: SEGMENTED_10
    Options:
        MovementSpeed: .4
        FollowRange: 50
        NoDamageTicks: 0
        PreventOtherDrops: true
        PreventItemPickup: true
        PreventJockeyMounts: true
        PreventRandomEquipment: true
        Silent: true
    Skills:
    - randomskill{skills=OdinJump,OdinCharge} @self ~onTimer:160
    - skill{s=OdinErupt} @PIR{r=40} ~onTimer:40 .25 <80%
    - skill{s=OdinRise3} @self ~onTimer:1 <80%
    - skill{s=OdinErupt2} @PIR{r=40} ~onTimer:40 .25 <40%
    - skill{s=OdinRise2} @self ~onTimer:1 <60%
    - skill{s=OdinRise1} @self ~onTimer:1 <40%
    - skill{s=OdinTick} @self ~onTimer:120 <20%
    - remove @MIR{t=UndeadWarden,UndeadGeneral,UndeadKeeper;r=100} ~onDeath
    - skill{s=CheckPlayerDeath} @target ~onTimer:200
    # RESET PARTY
    #- command{c="runicteleport <trigger.name> jorundrskeep"} @trigger ~onDeath 1.0
    #- command{c="party teleport <trigger.name>"} @trigger ~onDeath 1.0
    - skill{s=BossFirework} @trigger ~onDeath
    # DROPS
    #- command{c="runicboss <caster.uuid> jorundrskeep"} @self ~onDeath 1.0
    - command{c="runicgive exp <trigger.name> 5000 <trigger.l.x> <trigger.l.y> <trigger.l.z> 15"} @trigger ~onDeath 1.0
