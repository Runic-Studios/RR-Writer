JackalCaptain:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cJackal Captain'
  Health: 1250
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 18
  DamageModifiers:
  - FALL 0
  Equipment:
  - IRON_SWORD HAND
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lJackal Captain'
    Health: 1250
    Range: 30
    Color: RED
    Style: SEGMENTED_10
  Drops:
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.32
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - skill{s=JackalCaptain-drop} @trigger ~onDeath
  - command{c="ri drop pirate-fish <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 1
  - setvariable{var=caster.crew;value=0} @self ~onSpawn
  - skill{s=JackalCaptain} @self ~onTimer:120
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin SIMEIS_ setCustomName "&e[&6☠&e] &cJackal Captain" setDynamicName true
