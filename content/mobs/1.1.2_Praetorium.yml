praetorium-altar:
  Type: armor_stand
  Display: '&0'
  Health: 0
  Damage: 0
  Options:
    Invisible: false
    Marker: true
  Skills:
  #- message{m="<caster.var.altar>"} @PIR{r=32} ~onTimer:20
  - remove @MIR{t=praetorium-altar-timer,praetorium-altar-archer,praetorium-altar-cleric,praetorium-altar-mage,praetorium-altar-rogue,praetorium-altar-warrior;r=256} ~onSpawn
  - skill{s=praetorium-altar-completion} @self ~onTimer:20
  - setvariable{var=caster.archer;value=0} @self ~onSpawn
  - setvariable{var=caster.cleric;value=0} @self ~onSpawn
  - setvariable{var=caster.mage;value=0} @self ~onSpawn
  - setvariable{var=caster.rogue;value=0} @self ~onSpawn
  - setvariable{var=caster.warrior;value=0} @self ~onSpawn
  - setvariable{var=caster.archer;value=1} @self ~onSignal:archer
  - setvariable{var=caster.cleric;value=1} @self ~onSignal:cleric
  - setvariable{var=caster.mage;value=1} @self ~onSignal:mage
  - setvariable{var=caster.rogue;value=1} @self ~onSignal:rogue
  - setvariable{var=caster.warrior;value=1} @self ~onSignal:warrior
  - message{m="&6Imperial &eArcher &r&6has been defeated."} @PIR{r=48} ~onSignal:archer
  - message{m="&6Imperial &aCleric &r&6has been defeated."} @PIR{r=48} ~onSignal:cleric
  - message{m="&6Imperial &9Mage &r&6has been defeated."} @PIR{r=48} ~onSignal:mage
  - message{m="&6Imperial &cRogue &r&6has been defeated."} @PIR{r=48} ~onSignal:rogue
  - message{m="&6Imperial &fWarrior &r&6has been defeated."} @PIR{r=48} ~onSignal:warrior
  - setvariable{var=caster.forfeit;value=1} @self ~onSpawn
  - setvariable{var=caster.altar;value=1} @self ~onSpawn
  - skill{s=praetorium-altar} @self ~onInteract
  - skill{s=praetorium-altar-active} @self ~onInteract
  - skill{s=praetorium-altar-forfeit} @self ~onTimer:20
  - setvariable{var=target.leash;value=0} @trigger ~onSignal:leash
  Disguise: FALLING_BLOCK BOOKSHELF

