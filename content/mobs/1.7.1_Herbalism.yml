herbalism-event-rise-timer:
  Type: armor_stand
  Health: 10000
  BossBar:
    Enabled: true
    Title: '&6[EVENT] &e&lFlower Escape!'
    Range: 50
    Color: GREEN
    Style: SEGMENTED_10
  Skills:
  - setvariable{var=caster.active;value=1} @self ~onSpawn
  - signal{s=remove} @MIR{t=herbalism-event-rise-timer;r=100} ~onSpawn
  - remove @MIR{t=herbalism-event-rise-timer;r=100} ~onSignal:remove
  - skill{s=herbalism-event-remove} @self ~onTimer:20
  - setvariable{var=caster.remove;value=0} @self ~onSpawn
  - skill{s=herbalism-event-rise-timer-cast;delay=1} @self ~onSpawn
  - skill{s=herbalism-event-timer} @self ~onSpawn
  Options:
    Invisible: true
    Marker: true

ValerianGiver:
  Type: BABY_ZOMBIE
  Display: '&eValerian'
  Health: 1
  Damage: 1
  Faction: Herb
  Modules:
    ThreatTable: true
  DamageModifiers:
  - FALL 0
  Options:
    AlwaysShowName: true
    PreventJockeyMounts: true
    MovementSpeed: 0.09
    PreventRandomEquipment: true
    PreventOtherDrops: true
    FollowRange: 50
    NoDamageTicks: 0
    Silent: true
  Skills:
  - setvariable{var=target.remove;value=0} @MIR{t=herbalism-event-rise-timer;r=100} ~onSignal:check
  - skill{s=herbalism-spawn} @self ~onSpawn
  - skill{s=herbalism-event-rise} @self ~onSignal:rise
  - skill{s=herbalism-event-rise2} @self ~onSignal:rise2
  - skill{s=herbalism-event} @self ~onDeath
  - setlevel{a=set;l=15} ~onSpawn
  - skill{s=ValerianGiver-drop} @trigger ~onDeath
  - remove @self ~onDeath
#  - command{c="ri drop valerian <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 1
  AIGoalSelectors:
  - 0 fleeplayers
  AITargetSelectors:
  - 0 clear
  Disguise: FALLING_BLOCK AZURE_BLUET

