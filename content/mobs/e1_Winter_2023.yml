winter-2023-world-boss:
  Type: WITHER_SKELETON
  Display: '&b[☠] &9&lFallen Frost Lord'
  Health: 1000000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 250
  DamageModifiers:
  - FALL 0
  Equipment:
  - DIAMOND_SWORD HAND
  - DIAMOND_SWORD OFFHAND
  - PUMPKIN HEAD
  BossBar:
    Enabled: true
    Title: '&b&l[World Boss] &9&lFallen Frost Lord'
    Health: 1000000
    Range: 128
    Color: RED
    Style: SEGMENTED_10
  Drops:
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.4
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 100
    NoDamageTicks: 0
    Despawn: true
  Skills:
  - command{c="runicgive exp <trigger.name> 20000 <mob.l.x> <mob.l.y> <mob.l.z> 20"} @trigger ~onDeath 1.0
  - remove @MIR{t=winter-2023-world-boss-rogue-add,winter-2023-world-boss-twisted-add;r=256} ~onDeath
  - skill{s=winter-2023-world-boss-leash} @self ~onSignal:leash
  #- signal{s=remove} @MIR{t=winter-2023-world-boss;r=128} ~onSpawn
  #- remove @MIR{t=winter-2023-world-boss;r=128} ~onSignal:remove
  - skill{s=winter-2023-world-boss-player-burn} @PIR{r=100} ~onTimer:20
  - skill{s=winter-2023-world-boss-twisted-add-summon} @self ~onTimer:20
  - skill{s=winter-2023-threat} @target ~onTimer:20
  - skill{s=winter-2023-world-boss-mask} @self ~onTimer:20
  - skill{s=winter-2023-world-boss-mask-effect} @self ~onTimer:20
  - setvariable{var=caster.mask;value=0} @self ~onSpawn
  - setvariable{var=caster.class;value=0} @self ~onSpawn
  - equip{i=NETHERITE_CHESTPLATE:CHEST;delay=5} @self ~onSpawn  
  - equip{i=NETHERITE_BOOTS:FEET;delay=5} @self ~onSpawn  
  # RESET PARTY
  - skill{s=BossFirework} @trigger ~onDeath
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker

winter-2023-world-boss-altar-leash:
  Type: armor_stand
  Display: ''
  Options:
    Invisible: true
    Marker: true
  Skills:
  - skill{s=winter-2023-world-boss-altar-leash} @MIR{t=winter-2023-world-boss;r=256} ~onTimer:20

