hightower-pawn-elite:
  Type: ZOMBIE
  Display: '&e[&6✸&e] &cPromoted Pawn'
  Health: 4000
  Damage: 60
  DamageModifiers:
  - FALL 0
  Faction: Boss
  Modules:
    ThreatTable: true
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lElite&e&l] &c&lPromoted Pawn'
    Health: 4000
    Range: 32
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.4
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - skill{s=elite-threat} @target ~onTimer:80
  - signal{s=elite-remove} @MIR{t=hightower-pawn-elite-timer;r=50} ~onSignal:remove
  - skill{s=hightower-pawn-elite} @self ~onSpawn
  - skill{s=hightower-pawn-elite-skill} @self ~onTimer:80
  - command{c="runicgive exp <trigger.name> 8000 <mob.l.x> <mob.l.y> <mob.l.z> 37"} @trigger ~onDeath 1.0
  - command{c="ri drop-range 35 39 <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath
  - command{c="ri drop-range 35 39 <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath
  - command{c="ri drop-range 35 39 <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath
  - command{c="ri drop-range 35 39 <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath
  - command{c="ri drop hightower-pawn <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 1
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Disguise: player Steve setSkin AdmiralTyrano setCustomName "&e[&6✸&e] &cPromoted Pawn" setDynamicName true


