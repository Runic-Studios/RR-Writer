Goo:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &aGoo'
  Health: 750
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 12
  DamageModifiers:
  - FALL 0
  Drops:
  BossBar:
    Enabled: true
    Title: '&aGoo'
    Health: 1000
    Range: 25
    Color: GREEN
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.24
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 15
    NoDamageTicks: 0
  Skills:
  - command{c="runicgive exp <trigger.name> 500 <mob.l.x> <mob.l.y> <mob.l.z> 10"} @trigger ~onDeath
  - command{c="ri drop-range 8 12 <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath
  - randomskill{s=g1,g2,g3} @trigger ~onDeath
  - randomskill{s=gg2,gg3,gg4} @trigger ~onDeath 1.0
  - sound{s=entity.slime.hurt} @self ~onDamaged
  - setvariable{var=caster.passive;value=1} @self ~onSpawn 
  - setvariable{var=caster.skill;value=1} @self ~onSpawn 
  - skill{s=Goo-passive} @self ~onTimer:20
  - skill{s=Goo-skill1} @self ~onTimer:40 .4
  - skill{s=Goo-skill2} @self ~onTimer:40 .4
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: SLIME setSize 5

