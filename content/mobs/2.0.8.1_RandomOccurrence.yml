#elite altar

BanditAzana-elite-timer:
  Type: armor_stand
  Display: '&cActive in &e0<&co>10' #initial time
  Skills:
  - signal{s=remove} @MIR{t=BanditAzana-elite-timer,BanditAzana-elite;r=50} ~onSpawn #remove logic
  - remove @MIR{t=BanditAzana-elite-timer;r=50} ~onSignal:remove #remove logic
  - remove @self ~onSignal:elite-remove #remove logic
  - message{m="&e[&6✸&e] &c&lElite Altar &e&lhas spawned!";delay=1} @PIR{r=32} ~onSpawn #spawn message
  - summon{t=BanditAzana-elite} @self ~onSignal:summon #interact
  - remove @self ~onSignal:summon #interact
  - setvariable{var=caster.minute;v=0} @self ~onSpawn #initial minute
  - setvariable{var=caster.second;v=10} @self ~onSpawn #initial second
  - setvariable{var=caster.minute;v=1} @self ~onSignal:minute #active minute
  - setvariable{var=caster.second;v=31} @self ~onSignal:second #active second +1
  - skill{s=timer-start} @self ~onSpawn #timer start
  - skill{s=timer} @self ~onTimer:20 #timer
  - skill{s=timer-interact} @self ~onInteract #interact
  BossBar: #bossbar display
    Enabled: true
    Title: '&c&lRight Click<&co> &e&lChallenge Elite'
    Range: 5
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    Invisible: false
    Marker: true
  Disguise: FALLING_BLOCK COBBLED_DEEPSLATE_WALL

