underground-timer:
  Type: armor_stand
  Display: '&cActive in &e10<&co>00' #initial time
  Skills:
  - skill{s=underground-timer-start} @self ~onSpawn
  - message{m="&4[BETA] &c&lUnderground Passage &e&lopened at <mob.l.x>, <mob.l.y>, <mob.l.z>"} @PlayersOnServer ~onSpawn
  - message{m="&4[BETA] &e&lWill close if there are no players nearby"} @PIR{r=25} ~onSpawn
  - message{m="&4[BETA] &c&lUnderground Passage &e&lhas closed"} @PlayersOnServer ~onDespawn
  - skill{s=underground-timer-interact} @trigger ~onInteract
  - skill{s=blank} @self ~onSignal:summon #interact
  - setvariable{var=caster.minute;v=10} @self ~onSpawn #initial minute
  - setvariable{var=caster.second;v=0} @self ~onSpawn #initial second
  - setvariable{var=caster.minute;v=1} @self ~onSignal:minute #active minute
  - setvariable{var=caster.second;v=1} @self ~onSignal:second #active second +1
  - skill{s=timer-start} @self ~onSpawn #timer start
  - skill{s=timer} @self ~onTimer:20 #timer
  - skill{s=timer-interact} @self ~onInteract #interact
  BossBar: #bossbar display
    Enabled: true
    Title: '&c&lRight Click<&co> &e&lEnter Underground'
    Range: 10
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    Invisible: false
    Marker: true
  Disguise: FALLING_BLOCK COBBLED_DEEPSLATE_SLAB

