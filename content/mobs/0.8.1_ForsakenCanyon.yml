GoatMother:
  Type: BEE
  Display: '&e[&6☠&e] &cGoat Mother'
  Health: 2500
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 25
  DamageModifiers:
  - FALL 0
  BossBar:
    Enabled: true
    Title: '&e&l[&6&lMini-boss&e&l] &c&lGoat Mother'
    Health: 2500
    Range: 20
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.5
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: false
    FollowRange: 5
    NoDamageTicks: 5
  Skills:
  - skill{s=GoatMother-start} @target ~onEnterCombat
  - skill{s=GoatMother-drop} @trigger ~onDeath
  - skill{s=GoatMother-droplet} @self ~onTimer:80 >40%
  - skill{s=GoatMother-bite} @self ~onTimer:80 <40%
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: GHAST

GoatMother-spawn:
  Type: COW
  Display: '&fGoat'
