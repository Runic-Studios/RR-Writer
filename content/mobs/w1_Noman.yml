Noman:
  Type: ZOMBIE
  Display: '&4[☠] &c&lNoman Type A'
  Health: 1000000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 250
  DamageModifiers:
  - FALL 0
  BossBar:
    Enabled: true
    Title: '&4&l[World Boss] &c&lNoman Type A'
    Health: 1000000
    Range: 128
    Color: RED
    Style: SEGMENTED_10
  Drops:
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.32
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 64
    NoDamageTicks: 0
    Despawn: true
  Skills:
  - skill{s=Noman-knockup} @target ~onTimer:5
  - skill{s=valmyra-dungeon-threat} @target ~onTimer:20
  - skill{s=Noman-drop} @trigger ~onDeath
  - sound{s=entity.iron_golem.hurt} @self ~onDamaged
  - skill{s=Noman-launcher} @self ~onTimer:20 .25
  - skill{s=Noman-flamethrower} @self ~onTimer:20 .25
  - skill{s=Noman-ageofcreation} @self ~onTimer:20 <50%
  - skill{s=Noman-sentry1} @self ~onTimer:20 <80%
  - skill{s=Noman-sentry2} @self ~onTimer:20 <60%
  - skill{s=Noman-sentry3} @self ~onTimer:20 <40%
  - skill{s=Noman-sentry4} @self ~onTimer:20 <20%
  - skill{s=Noman-passive} @self ~onTimer:20
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: IRON_GOLEM


