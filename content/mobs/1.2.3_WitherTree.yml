  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin gex1nator setCustomName "&e[&6☠&e] &cGrommak" setDynamicName true

