blackfrost-devourer:
  Type: ZOMBIE
  Display: '&4[☠] &cBlackfrost Devourer'
  Health: 300000
  # Health dependencies: blackfrost-devourer-sonar, blackfrost-devourer-heartbeat-effect
  Modules:
    ThreatTable: true
  Damage: 400
  DamageModifiers:
  - FALL 0
  Faction: Boss
  BossBar:
    Enabled: true
    Title: '&4&l[Conjured Boss] &c&lBlackfrost Devourer'
    Health: 300000
    Range: 64
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.32
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 100
    NoDamageTicks: 0
  Skills:
  - skill{s=blackfrost-devourer-water-leash} @self ~onTimer:40
  #- randomskill{s=black-frost2,black-frost3} @trigger ~onDeath 1.0
  - skill{s=blackfrost-devourer-leash} @self ~onSignal:leash
  - command{c="runicgive exp <trigger.name> 25000 <mob.l.x> <mob.l.y> <mob.l.z> 60"} @trigger ~onDeath 1.0
  - setvariable{var=caster.heart;value=1} @self ~onSpawn
  - skill{s=blackfrost-devourer-ice-random} @self ~onTimer:20 .25 <75% #teleports a player under the ice who must then swim up and be let out by other players.
  - skill{s=blackfrost-devourer-heartbeat-set} @self ~onTimer:40 .25 <95% 
  #- skill{s=blackfrost-devourer-summon-air1} @self ~onTimer:20 <75%
  #- skill{s=blackfrost-devourer-summon-air2} @self ~onTimer:20 <50%
  - skill{s=blackfrost-devourer-summon-air3} @self ~onTimer:20 <25%
  - skill{s=blackfrost-devourer-heartbeat1} @self ~onSpawn
  - skill{s=blackfrost-devourer-sonar} @self ~onTimer:20 .15 <85%
  - skill{s=blackfrost-devourer-threat} @target ~onTimer:40
  - skill{s=blackfrost-devourer-teleport} @trigger ~onDamaged .15
  - skill{s=blackfrost-devourer-teleport-message} @trigger ~onDamaged 
  - signal{s=remove} @MIR{t=blackfrost-devourer;r=128} ~onSpawn
  - remove @MIR{t=blackfrost-devourer;r=128} ~onSignal:remove
  - signal{s=feed} @MIR{t=blackfrost-spirit;r=128} ~onTimer:20
  - skill{s=BossFirework} @trigger ~onDeath
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Disguise: WARDEN

