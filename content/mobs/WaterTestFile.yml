drifter-miniboss:
  Type: ZOMBIE
  Display: '&e[&645&e] &cThe Drifter'
  Health: 9000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 75
  DamageModifiers:
  - FALL 0
  Equipment:
  - GOLDEN_SWORD HAND
  - CHAINMAIL_CHESTPLATE CHEST
  - CHAINMAIL_LEGGINGS LEGS
  - CHAINMAIL_BOOTS FEET
  BossBar:
    Enabled: true
    Title: '&e&lThe Drifter'
    Health: 9000
    Range: 25
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.32
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 25
    NoDamageTicks: 0
  Skills: 
  - skill{s=drifter-miniboss-smoke-bomb} @self ~onTimer:240
  - skill{s=drifter-miniboss-assassinate} @self ~onTimer:60 <30% .5
  - skill{s=drifter-miniboss-leap} @self ~onTimer:45
  - skill{s=drifter-miniboss-stab} @self ~onTimer:10
  - setvariable{var=caster.leap;value=1} @self ~onSpawn
  - setvariable{var=caster.stab;value=1} @self ~onSpawn
  - skill{s=drifter-miniboss-cocoon} @target ~onTimer:20 .4 
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin Skrafty setCustomName "&e[&6☠&e] &cThe Drifter" setDynamicName true

SmokeBomb1:
  Type: BABY_ZOMBIE
