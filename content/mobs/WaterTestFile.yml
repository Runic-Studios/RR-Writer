test:
  Type: armor_stand
  Skills:
  - skill{s=herbalism-event-rise-cast} @MIR{t=ValerianGiver,ComfreyGiver,BoswelliaGiver,TurmericGiver,ChamomileGiver,SnowdropGiver,HibiscusGiver,WintercressGiver,PsylliumGiver,ArugulaGiver,LavenderGiver,PetuniaGiver;r=100} ~onSpawn
  Options:
    Invisible: true
    HasGravity: false
