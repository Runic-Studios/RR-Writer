ambient_chicken:
  Type: CHICKEN
  Display: '&e[&61&e] &aWild Chicken'
  Health: 25
  DamageModifiers:
  - FALL 0
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.24
    PreventOtherDrops: true
  AIGoalSelectors:
  - 0 clear
  - 1 randomstroll
  - 2 fleeplayers
  - 3 randomlookaround
  - 4 float
  Skills:
  - command{c="ri drop raw-meat <mob.l.w>,<mob.l.x>,<mob.l.y>,<mob.l.z> 1"} @trigger ~onDeath 1
  - command{c="runicgive exp <trigger.name> 2 <mob.l.x> <mob.l.y> <mob.l.z> 1"} @trigger ~onDeath 1.0
