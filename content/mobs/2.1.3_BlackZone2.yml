

# Awakened Shrub #

Awakened_Shrub:
  Type: ZOMBIE
  Display: '&e[&660&e] &fAwakened Shrub'
  Health: 1000
  Damage: 65
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.22
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 10
    NoDamageTicks: 0
  Modules:
    ThreatTable: true
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Skills:
  - model{mid=awakened_shrub;n=true;step=1} @self ~onSpawn
  - command{c="runicgive exp <trigger.name> 1804 <mob.l.x> <mob.l.y> <mob.l.z> 60"} @trigger ~onDeath 1.0
  - randomskill{s=g3,g4} @trigger ~onDeath .3
  - effect:sound{s=entity.bee.pollinate;volume=0.8;pitch=1} @self ~onTimer:140 0.35
  - effect:sound{s=entity.bee.pollinate:samus.skeleton_idle;volume=0.8;pitch=1.2} @self ~onDeath
  - skill{s=Changetarget} ~onTimer:160 <99%
  - skill{s=Cancelattack;sync=true} ~onAttack
  - skill{s=Awakened_Shrub_Attack} ~onTimer:20 0.7
  - skill{s=Awakened_Shrub_Hit} ~onDamaged
  
