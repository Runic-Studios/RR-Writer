# Mutant Flower #

Mutant_Flower:
  Type: ZOMBIE
  Display: '&4[☠] &4Mutant Flower'
  Health: 500000
  Damage: 600
  BossBar:
    Enabled: true
    Title: '&4Mutant Flower'
    Health: 500000
    Range: 64
    Color: RED
    Style: SEGMENTED_10
    DarkenSky: false
  Options:
    MovementSpeed: 0.01
    ShowHealth: false
    PreventRandomEquipment: true
    AlwaysShowName: true
    Persistent: false
    Collidable: true
    PreventOtherDrops: true
    FollowRange: 100
    Silent: true
    KnockbackResistance: 1
    PreventSunburn: true
    NoDamageTicks: 0
  Modules:
    ThreatTable: true
  DamageModifiers:
  - FALL 0
  AIGoalSelectors:
  - 0 clears
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Skills:
  - setAI{ai=false} @self ~onSpawn
  - model{mid=mutant_flower;n=false;step=1;lockpitch=true;lockyaw=true} @self ~onSpawn
  - command{c="runicgive exp <trigger.name> 1804 <mob.l.x> <mob.l.y> <mob.l.z> 60"} @trigger ~onDeath 1.0
  - effect:sound{s=entity.zoglin.ambient;volume=0.6;pitch=0.4} @self ~onTimer:140 0.35
  - effect:sound{s=entity.zoglin.ambient;volume=0.6;pitch=0.5} @self ~onDeath
  - skill{s=Changetarget} ~onTimer:160 <99%
  - skill{s=Cancelattack;sync=true} ~onAttack
  - skill{s=Mutant_Flower_Hit} @self ~onDamaged
  - skill{s=Summon_Vines} ~onSpawn
  
  - skill{s=Mutant_Flower_Vine_Root} @PIR{r=15} ~onTimer:80
  - skill{s=Mutant_Flower_Skill} ~onTimer:120 >50%
  - skill{s=Summon_Vines_RANDOM} ~onTimer:200 0.6 >50%
  - effect:particles{particle=redstone;color=#03ab65;size=0.6;amount=35;hS=2;vS=2;y=0.7;speed=0;forwardOffset=0;sideOffset=0} @self ~onTimer:20 >50%
  - skill{s=Mutant_Flower_Venom_Aura} @PIR{r=5} ~onTimer:80 >50%
  
  - skill{s=Mutant_Flower_Skill_2} ~onTimer:120 <50%
  - skill{s=Summon_Vines_RANDOM2} ~onTimer:200 0.6 <50%
  - effect:particles{particle=redstone;color=#4406cc;size=0.6;amount=35;hS=2;vS=2;y=0.7;speed=0;forwardOffset=0;sideOffset=0} @self ~onTimer:20 <50%
  - skill{s=Mutant_Flower_Venom_Aura2} @PIR{r=5} ~onTimer:80 <50%
  
  - skill{s=Mutant_Flower_Death} ~onDeath

