golem-conjured:
  Type: ZOMBIE
  Display: '&4[☠] &cHeart of The Colossus'
  Health: 300000
  Modules:
    ThreatTable: true
  Damage: 400 #buffed damage from 250 -> 400
  DamageModifiers:
  - FALL 0
  Faction: Boss
  BossBar:
    Enabled: true
    Title: '&4&l[Conjured Boss] &c&lHeart of The Colossus'
    Health: 300000
    Range: 50
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.2
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 25
    NoDamageTicks: 0
  Skills:
  - remove @MIR{t=golem-conjured-floor-skill2-add;r=2} ~onSignal:wave
  - skill{s=golem-conjured-outside-leash} @self ~onTimer:80
  - skill{s=golem-conjured-floor-skill} @self ~onTimer:20
  - skill{s=golem-conjured-leash} @MIR{t=golem-conjured-fire,golem-conjured-water,golem-conjured-earth,golem-conjured-void,golem-conjured-light;r=128} ~onTimer:20
  - skill{s=golem-conjured-leg-teleport-reset} @self ~onDeath
  - skill{s=golem-conjured-variable} @self ~onSpawn
  - skill{s=golem-conjured-hurt} @self ~onSignal:hurt
  - skill{s=golem-conjured-threat} @target ~onTimer:20
  - skill{s=golem-threat-outside} @target ~onTimer:20
  - skill{s=golem-conjured-leg-stomp} @self ~onTimer:40 #this is the pillar attack
  - skill{s=golem-conjured-leg-inactive} @self ~onTimer:20
  - skill{s=golem-conjured-damaged} @self ~onDamaged
  - signal{s=remove} @MIR{t=golem-conjured;r=128} ~onSpawn
  - remove @MIR{t=golem-conjured;r=128} ~onSignal:remove
  - skill{s=golem-conjured-drop} @trigger ~onDeath
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 players
  - 2 hurtbytarget
  Disguise: IRON_GOLEM
