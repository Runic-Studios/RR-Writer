pyromancer-iii:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cIgnaroth'
  Health: 1000000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 250
  DamageModifiers:
  - FALL 0
  Equipment:
  - FireSword HAND
  - FireSword OFFHAND
  BossBar:
    Enabled: true
    Title: '&c&lIgnaroth'
    Health: 1000000
    Range: 128
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 50
    NoDamageTicks: 0
  Skills:
  - skill{s=valmyra-dungeon-threat} @target ~onTimer:20 
  - skill{s=pyromancer-equip} @self ~onSpawn 
  - variableadd{var=caster.hunger;amount=1} @self ~onSignal:feed
  - remove @MIR{t=pyromancer-iii-clone1,pyromancer-iii-clone2,pyromancer-iii-clone3,pyromancer-iii-clone4,pyromancer-iii-clone5,pyromancer-iii-heart1,pyromancer-iii-heart2,pyromancer-iii-heart3,pyromancer-iii-heart4,pyromancer-iii-heart5,pyromancer-hunger-visual1,pyromancer-hunger-visual2,pyromancer-hunger-visual3,pyromancer-rider,pyromancer-elemental,pyromancer-grunt,pyromancer-archer,pyromancer-lightning-bolt-add,pyromancer-portal,pyromancer-ii-portal-unbreakable;r=100} ~onSpawn
  - remove @MIR{t=pyromancer-iii-clone1,pyromancer-iii-clone2,pyromancer-iii-clone3,pyromancer-iii-clone4,pyromancer-iii-clone5,pyromancer-iii-heart1,pyromancer-iii-heart2,pyromancer-iii-heart3,pyromancer-iii-heart4,pyromancer-iii-heart5,pyromancer-hunger-visual1,pyromancer-hunger-visual2,pyromancer-hunger-visual3,pyromancer-rider,pyromancer-elemental,pyromancer-grunt,pyromancer-archer,pyromancer-lightning-bolt-add,pyromancer-portal,pyromancer-ii-portal-unbreakable;r=100} ~onDeath
  - setvariable{var=caster.hungry;value=0} @self ~onSpawn
  - setvariable{var=caster.hunger;value=0} @self ~onSpawn
  - setvariable{var=caster.far;value=0} @self ~onSpawn
  - skill{s=pyromancer-iii-fireball-cast} @self ~onTimer:10 .1 
  - skill{s=pyromancer-iii-portal-cast} @self ~onTimer:20
  - skill{s=pyromancer-iii-portal-unbreakable-cast} @self ~onTimer:20 <50%
  - skill{s=pyromancer-iii-feast} @self ~onTimer:20 
  - skill{s=pyromancer-iii-hunger-cast} @self ~onTimer:10 .25 
  - skill{s=pyromancer-iii-hunger} @self ~onTimer:20 .25 
  - skill{s=pyromancer-iii-lava} @self ~onTimer:20
  - skill{s=pyromancer-iii-clone} @self ~onTimer:20 <75%
  - skill{s=pyromancer-iii-clone2} @self ~onTimer:20 <25%
  - skill{s=pyromancer-melee} @self ~onTimer:20
  - skill{s=pyromancer-visual} @self ~onTimer:5
  - skill{s=pyromancer-far} @self ~onTimer:5
  - effect:particlesphere{p=end_rod;amount=5;radius=6;yOffset=0.5} @Location{c=10171.5,188,603.5} ~onTimer:2 
  - skill{s=pyromancer-iii-lightning-bolt} @self ~onTimer:20 
  # RESET PARTY
  - skill{s=BossFirework} @trigger ~onDeath
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin D1M0nEL setCustomName "&e[&6☠&e] &cIgnaroth" setDynamicName true


