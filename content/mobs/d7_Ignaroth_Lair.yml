pyromancer-i:
  Type: ZOMBIE
  Display: '&e[&6☠&e] &cIgnaroth'
  Health: 400000
  Faction: Boss
  Modules:
    ThreatTable: true
  Damage: 250
  DamageModifiers:
  - FALL 0
  Equipment:
  - FireSword HAND
  - FireSword OFFHAND
  BossBar:
    Enabled: true
    Title: '&c&lIgnaroth'
    Health: 400000
    Range: 128
    Color: RED
    Style: SEGMENTED_10
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.28
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 50
    NoDamageTicks: 0
  Skills:
  - skill{s=valmyra-dungeon-threat} @target ~onTimer:20 #reset threat if target runs too far away
  - skill{s=pyromancer-equip} @self ~onSpawn #equip armour
  - variableadd{var=caster.hunger;amount=1} @self ~onSignal:feed #gained from fireball-cast (increases hungER by 1)
  - remove @MIR{t=pyromancer-hunger-visual1,pyromancer-hunger-visual2,pyromancer-hunger-visual3,pyromancer-rider,pyromancer-elemental,pyromancer-grunt,pyromancer-archer,pyromancer-lightning-bolt-add,pyromancer-portal;r=100} ~onSpawn
  - remove @MIR{t=pyromancer-hunger-visual1,pyromancer-hunger-visual2,pyromancer-hunger-visual3,pyromancer-rider,pyromancer-elemental,pyromancer-grunt,pyromancer-archer,pyromancer-lightning-bolt-add,pyromancer-portal;r=100} ~onDeath
  #- blockunmask{r=64} ~onDeath #causes server to lag
  - setvariable{var=caster.hungry;value=0} @self ~onSpawn
  - setvariable{var=caster.hunger;value=0} @self ~onSpawn
  - setvariable{var=caster.far;value=0} @self ~onSpawn
  - skill{s=pyromancer-fireball-cast} @self ~onTimer:10 .1 #casts magmas up into the air if hungER = 1, which you need to kill before they land or they send feed signal
  - skill{s=pyromancer-portal-cast} @self ~onTimer:20 <75%
  - skill{s=pyromancer-feast} @self ~onTimer:20 #Triggers if hungER > 2! instakill ability: same one as original cyrus. It's balanced.
  - skill{s=pyromancer-hunger-cast} @self ~onTimer:10 #.25 #if hungRY = 1 then damages all players on barrier blocks for 400 every ~2 seconds
  - skill{s=pyromancer-hunger} @self ~onTimer:20 1 <90% #if hungRY = 0 then sets to 1 and shows visuals then another spell removes visuals and sets hungRY to 0. set randomness to 1 from 0.25.
  - skill{s=pyromancer-lava} @self ~onTimer:20 #if touches lava, heals and tps back
  - skill{s=pyromancer-melee} @self ~onTimer:20 #3 AOE damaging effects, cooldown is halved if pyro moves away from barrier blocks
  - skill{s=pyromancer-visual} @self ~onTimer:5 #gives pyro speed if he's not on barrier blocks 
  - skill{s=pyromancer-far} @self ~onTimer:5 #updates visuals and variables if pyro not on barrier blocks
  - effect:particlesphere{p=end_rod;amount=5;radius=6;yOffset=0.5} @Location{c=9931.5,188,603.5} ~onTimer:2 <50%
  - skill{s=pyromancer-lightning-bolt} @self ~onTimer:20 <50% #summons lightning bolts around the side of the arena that empower mobs they hit, do damage to players, and spawn a miniboss
  # RESET PARTY
  - skill{s=BossFirework} @trigger ~onDeath
  - message{m="&e[&6☠&e] &cIgnaroth<&co> How foolish you are to return. I<&sq>ll make this our last reunion."} @PIR{r=100} ~onSpawn
  AIGoalSelectors:
  - 0 clear
  - 1 meleeattack
  - 2 float
  AITargetSelectors:
  - 0 clear
  - 1 attacker
  Disguise: player Steve setSkin D1M0nEL setCustomName "&e[&6☠&e] &cIgnaroth" setDynamicName true

