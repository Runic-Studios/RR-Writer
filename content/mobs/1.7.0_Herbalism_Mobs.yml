#Zone 1
ForestNymph:
    Type: ZOMBIE
    Display: '&e[&68&e] &cForest Nymph'
    Health: 100
    Modules:
        ThreatTable: true
    Damage: 5
    DamageModifiers:
    - FALL 0
    Equipment:   
    Options:
        MovementSpeed: 0.28
        PreventOtherDrops: true
        FollowRange: 30
        MaxCombatDistance: 35
        NoDamageTicks: 0
        PreventJockeyMounts: true
        PreventRandomEquipment: true
        Silent: true
    Skills:
    - summon{type=ForestNymphPoof;amount=1;radius=1;os=true} @target ~onTimer:120 .6
    - summon{type=ForestSlime;amount=1;radius=5;os=true} @self ~onTimer:240 .6
    - command{c="runicgive exp <trigger.name> 80 <mob.l.x> <mob.l.y> <mob.l.z> 10"} @trigger ~onDeath 1.0
    AIGoalSelectors:
    - 0 clear
    - 1 meleeattack
    - 2 float
    AITargetSelectors:
    - 0 clear
    - 1 players
    - 2 hurtbytarget
    Disguise: player Steve setSkin Amni_ setCustomName "&e[&68&e] &cForest Nymph" setDynamicName true
ForestNymphPoof:
    Type: armor_stand
    Display: '&0'
    Health: 0
    Damage: 0
    Skills:
