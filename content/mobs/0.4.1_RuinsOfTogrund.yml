  Display: '&4[☠] &cBlood Harvester'
  Health: 10000
  Damage: 50
  DamageModifiers:
  - FALL 0
  Faction: Boss
  BossBar:
    Enabled: true
    Title: '&4&l[Field Boss] &r&c&lBlood Harvester'
    Health: 10000
    Range: 32
    Color: RED
    Style: SEGMENTED_10
  Modules:
