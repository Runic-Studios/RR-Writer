  AIGoalSelectors:
  - 0 clear
  - 1 gotolocation -1720,50,-183
  AITargetSelectors:
  - 0 clear
  Disguise: player Steve setSkin Mup68 setCustomName "&e[&64&e] &aHobling Villager" setDynamicName true
