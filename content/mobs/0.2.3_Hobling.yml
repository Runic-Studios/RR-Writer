HoblingCutscene:
  Type: ZOMBIE
  Display: '&e[&64&e] &aHobling Villager'
  Health: 80
  Damage: 15
  DamageModifiers:
  - FALL 0
  Equipment:
  - wooden_hoe HAND
  Modules:
    ThreatTable: true
  Options:
    AlwaysShowName: true
    MovementSpeed: 0.34
    PreventOtherDrops: true
    PreventJockeyMounts: true
    PreventRandomEquipment: true
    Silent: true
    FollowRange: 20
    NoDamageTicks: 0
  Skills:
  - ignite{d=120} @self ~onSpawn
  - potion{t=SLOW;d=40;l=10} @self ~onSpawn
  - jump{v=0.4;delay=20} @self ~onSpawn
  - jump{v=0.4;delay=30} @self ~onSpawn
