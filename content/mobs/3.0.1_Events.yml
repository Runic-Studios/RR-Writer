frost-event-start:
  Type: armor_stand
  Display: ''
  Options:
    Invisible: true
    HasGravity: false
    Marker: true
  Skills:
  - remove @MIR{t=frost-event-enemy-2-marker,frost-event-timer,frost-event-countdown-timer,frost-event-enemy-1,frost-event-enemy-2,frost-event-enemy-3,frost-event-enemy-4,frost-event-enemy-5,frost-event-enemy-6;r=128} ~onSpawn
  - summon{t=frost-event-timer} @Location{c=1564.5,23,-1147.5} ~onSpawn
  - remove @self ~onSpawn
