frost-event-timer:
  Type: armor_stand
  Display: '&0'
  Health: 30 #number of waves
  Options:
    Invisible: true
    HasGravity: false
    Marker: true
  BossBar:
    Enabled: true
    Title: '&c&lCrimson Chapel Defense'
    Range: 64
    Color: RED
    Style: SEGMENTED_10
  Skills:
  - message{m="&cThe Crimson Chapel Defense has begun!"} @PIR{r=128}
  - summon{t=frost-event-enemy-2-marker} @self ~onSpawn
  - setvariable{var=caster.wave;value=0} @self ~onSpawn
  - skill{s=frost-event-countdown-timer} @self ~onSpawn
  - skill{s=frost-event-timer} @self ~onTimer:20
  - skill{s=frost-event-countdown-timer} @self ~onSignal:countdown
frost-event-enemy-2-marker:
  Type: armor_stand
  Display: '&0'
  Options:
    Invisible: true
    HasGravity: false
    Marker: true
  Skills:
  - signal{s=boom} @MIR{t=frost-event-enemy-2;r=2} ~onTimer:20
frost-event-countdown-timer:
  Type: armor_stand
  Display: '&0'
  Health: 60 #duration of wave
  Options:
    Invisible: true
    HasGravity: false
    Marker: true
  BossBar:
    Enabled: true
    Title: '&d&lWave Countdown'
    Range: 64
    Color: PINK
    Style: SEGMENTED_10
  Skills:
  - setvariable{var=caster.pause;value=0} @self ~onSpawn
  - skill{s=frost-event-countdown-timer-remove} @self ~onTimer:20
  - skill{s=frost-event-countdown-wave-pause} @self ~onSignal:pause
  - skill{s=frost-event-countdown-wave-unpause} @self ~onSignal:unpause
  - skill{s=frost-event-countdown-wave-skip} @self ~onSignal:skip
  - skill{s=frost-event-countdown-wave-clear-and-skip} @self ~onSignal:clear-and-skip
  - skill{s=frost-event-countdown-wave-delay-10} @self ~onSignal:delay-10
  - skill{s=frost-event-countdown-wave-delay-25} @self ~onSignal:delay-25
  - skill{s=frost-event-countdown-wave-delay-60} @self ~onSignal:delay-60
  - skill{s=frost-event-countdown-timer-damage} @self ~onTimer:20

