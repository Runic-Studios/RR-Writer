BossFirework:
    Skills:
    - delay 2
    - command{c="runicfirework <trigger.uuid>"} @trigger
    - message{m="&a&lCongratulations! You defeated the dungeon boss!"} @trigger
GoblinRiderLunge:
    Conditions:
    - playerwithin 6
    - playernotwithin 5
    Skills:
    - jump{v=0.4}
    - delay 2
    - leap{v=250} @NearestPlayer{r=6}
CaveOgreBlindness:
    Cooldown: 16
    Conditions:
    - incombat{}
    Skills:
    - delay 20
    - potion{t=BLINDNESS;l=1;d=40;p=false;i=false}
    - randommessage{m="&cCave Ogre<&co> &4You die now!","&cCave Ogre<&co> &4I kill you!","&cCave Ogre<&co> &4You are die!";} @PIR{r=12}
    - potion{t=SPEED;l=1;d=60;p=false;i=false} @self
CaveOgreSmack:
    Cooldown: 12
    Conditions:
    - incombat{}
    - playerwithin 4
    Skills:
    - delay 40
    - randommessage{m="&cCave Ogre<&co> &4I smack you!","&cCave Ogre<&co> &4I hit you!","&cCave Ogre<&co> &4I stab you!";} @PIR{r=12}
    - delay 20
    - sound{s=block.gravel.break} @Self
    - command{c="runicdamage <caster.uuid> <target.name> 10"}  @PIR{r=2}
    - skill{s=GoblinStun} @PIR{r=2}
    - potion{type=BLINDNESS;duration=40;level=1} @PIR{r=2}
    - potion{type=NAUSEA;duration=120;level=1} @PIR{r=2}
CaveOgreJump:
    Cooldown: 20
    Conditions:
    - incombat{}
    - playerwithin 6
    Skills:
    - delay 80
    - randommessage{m="&cCave Ogre<&co> &4I jump!","&cCave Ogre<&co> &4I go up!","&cCave Ogre<&co> &4I move high!";} @PIR{r=12}
    - delay 20
    - jump{v=0.6
    - delay 25
    - sound{s=block.gravel.break} @Self
    - velocity{v=400} @PIR{r=4}
    - effect:particlesphere{particle=block_crack;material=stone;amount=25;radius=4;yOffset=.5}
    - potion{type=BLINDNESS;duration=40;level=3} @PIR{r=4}
    - potion{type=SLOW;duration=40;level=3} @PIR{r=4}
    - command{c="runicdamage <caster.uuid> <target.name> 10"}  @PIR{r=4}
GoblinSmokeBomb:
    Conditions:
    - playerwithin 12
    - incombat{}
    Cooldown: 20
    Skills:
    - potion{type=BLINDNESS;duration=120;level=1} @PIR{r=8}
    - potion{type=INVISIBILITY;duration=120;level=1;hasParticles=false} 
    - potion{type=SPEED;duration=120;level=1;hasParticles=false} 
    - effect:particles{particle=explosion_large;a=20;hs=1;vs=1;r=30} 
    - sound{s=block.fire.extinguish;v=2}
GoblinThiefTrap:
    Conditions:
    - playerwithin 12
    Skills:
