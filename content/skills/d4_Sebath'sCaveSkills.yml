    - sound{s=block.metal_pressure_plate.click_on}
    - delay 20
    - sound{s=block.metal_pressure_plate.click_on}
    - delay 20
    - sound{s=block.metal_pressure_plate.click_on}
    - delay 20
    - sound{s=block.metal_pressure_plate.click_on}
    - delay 20
    - sound{s=block.metal_pressure_plate.click_off}
    - summon{type=GoblinTrap;amount=1;radius=0} @self
GoblinStun:
    Skills:
    - aura{auraName=GoblinStun;onTick=GoblinStun-Tick;interval=1;duration=40} @self
GoblinStun-Tick:
    Skills:
    - velocity{vx=0;vy=0;vz=0} @PIR{r=2}
  
GoblinSwarm1:
    Conditions:
    - varinrange{var=caster.mobsNear;value=>5} castinstead GoblinSwarm3
    - varinrange{var=caster.mobsNear;value=>3} castinstead GoblinSwarm2
    - varinrange{var=caster.mobsNear;value=>1}
    Skills:
    - skill{s=GoblinStun} 
    - command{c="runicdamage <caster.uuid> <target.name> 1"} @PIR{r=3} 
GoblinSwarm2:
    Skills:
    - potion{type=BLINDNESS;duration=40;level=1} @PIR{r=2}
    - skill{s=GoblinStun} 
    - command{c="runicdamage <caster.uuid> <target.name> 1"} @PIR{r=3}  
GoblinSwarm3:
    Skills:
    - potion{type=BLINDNESS;duration=40;level=1} @PIR{r=2}
    - skill{s=GoblinStun} 
    - command{c="runicdamage <caster.uuid> <target.name> 1"} @PIR{r=3} 
ResetGoblinCount:
    Skills:
    - setvariable{var=caster.mobsNear;value=0}	
AddGoblinCount:
    Conditions:
    - incombat{} true
    Skills:
    - variableadd{var=caster.mobsNear;amount=1}	 
NearbyGoblinMechanics:
    Conditions:
    - incombat{} true
    Skills:
    - skill{s=ResetGoblinCount}	
    - skill{s=AddGoblinCount} @MIR{t=GoblinFootSoldier;r=5}	
    - skill{s=GoblinSwarm1}     
    
GoblinTrapPrimed:
    Conditions:
    - playerwithin 4
    - variableEquals{var=caster.number;value=0}
    Skills:
    - message{m="&7Triggered a goblin trap, right click to disarm it!"} @PIR{r=6}
    - potion{type=SLOW;duration=40;level=1} @PIR{r=6}
    - setvariable{var=caster.number;value=1} 
#    - setname{name="&e[&66&e] &cPrimed Goblin Trap"}
    - sound{s=block.metal_pressure_plate.click_on}
GoblinTrapExplosion:
    Conditions:
    - playernotwithin 4
    - variableEquals{var=caster.number;value=1}
    Skills:
    - message{m="&7Unsuccesfully disarmed the goblin trap!"} @PIR{r=6}
    - command{c="runicdamage <caster.uuid> <target.name> 25"} @PIR{r=6}
    - damage{a=100} @MIR{t=GoblinFootSoldier} 
    - potion{type=SLOW;duration=40;level=10} @PIR{r=6}
    - potion{type=BLINDNESS;duration=60;level=2} @PIR{r=6}
    - sound{s=entity.generic.explode;v=2}
    - effect:particles{particle=explosion_large;a=3;hs=1;vs=1;r=30}
    - remove
GoblinTrapParticle:
    Conditions:
    - variableEquals{var=caster.number;value=1}
    - variableEquals{var=caster.disarm;value=0}
    Skills:
    - effect:particlesphere{p=reddust;amount=4;radius=1} 
GoblinTrapDisarm:
    Conditions:
    - variableEquals{var=caster.disarm;value=0}
    Skills:
    - setvariable{var=caster.disarm;value=1} 
    - message{m="&7Disarming the goblin trap"} @PIR{r=5}
GoblinTrapDisarming:
    Conditions:
    - playerwithin 4
    - variableEquals{var=caster.disarm;value=1}
    Skills:
    - variablesubtract{var=caster.disarming;amount=1}
    - sound{s=block.metal_pressure_plate.click_on}
    - effect:particlesphere{p=reddust;c=#B9B9B9;amount=4;radius=1} 
    - delay 10
    - effect:particlesphere{p=reddust;c=#B9B9B9;amount=4;radius=1} 
GoblinTrapDisarmed:
    Conditions:
    - variableEquals{var=caster.disarming;value=0}
    Skills:
    - sound{s=block.metal_pressure_plate.click_off}
    - message{m="&7Succesfully disarmed the goblin trap!"} @PIR{r=5}
    - remove
GoblinTrapHeal:
    Conditions:
    - variableEquals{var=caster.number;value=1}
    Skills:
    - heal{a=100} 

