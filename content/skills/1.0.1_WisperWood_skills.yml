wisperwood-rogue-night:
  Conditions:
  - night{} true
  Skills:
  - potion{t=SPEED;d=25;l=2;hasParticles=false} 
wisperwood-rogue:
  Conditions:
  - incombat{}
  Cooldown: 8
  Skills:
  - jump{v=0.2}
  - delay 2
  - skill{s=wisperwood-rogue-leap} @target
  - delay 5
  - effect:particlesphere{p=squid_ink;a=1;r=1;yOffset=.5} 
  - potion{t=INVISIBILITY;d=15;l=1;hasParticles=false}
  - equip{i=AIR:0}
  - equip{i=AIR:OFFHAND}
  - delay 15
  - effect:particlesphere{p=squid_ink;a=5;r=1;yOffset=.5} 
  - equip{i=IRON_SWORD:0}
  - equip{i=IRON_SWORD:OFFHAND}
wisperwood-rogue-leap:
