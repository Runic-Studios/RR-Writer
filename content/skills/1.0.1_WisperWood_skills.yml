wisperwood-boss-summon-marker:
  Conditions:
  - incombat{}
  Cooldown: 4
  Skills:
  - summon{t=wisperwood-boss-marker;r=8;os=true}
wisperwood-boss-marker:
  Skills:
  - sound{s=block.stone.place}
  - blockmask{m=blackstone;r=5;d=60}
  - delay 60
  - sound{s=block.stone.break}
  - command{c="runicdamage <caster.uuid> <target.name> 25"} @PIR{r=5}
  - throw{vy=12} @PIR{r=5}
  - remove
wisperwood-boss-leap:
  Conditions:
  - incombat{}
  Cooldown: 4
  Skills:
  - potion{t=SLOW;d=20;l=1;hasParticles=false}
  - leap{v=400} @RLNTE{a=1;r=5;s=1;minr=3}
  - delay 20
  - skill{s=wisperwood-boss-proj}

wisperwood-boss-proj:
  Conditions:
  - incombat{}
  Skills:
  - potion{t=SLOW;d=20;l=3;hasParticles=false}
  - delay 10
  - projectile{ot=wisperwood-boss-proj-tick;oh=wisperwood-boss-proj-hit;v=8;i=1;hR=1;vR=1;v=25} @target
wisperwood-boss-proj-tick:
  Skills:
  - effect:particles{p=reddust;r=1;c=#000000;a=5;speed=0;hS=0.2;vS=0.2} @Origin
wisperwood-boss-proj-hit:
  Skills:
  - command{c="runicdamage <caster.uuid> <target.name> 25"} @PlayersNearOrigin{r=2}
  - potion{type=SLOW;duration=60;lvl=2} @PlayersNearOrigin{r=5}
  - effect:particlesphere{p=reddust;r=2;c=#000000;a=25;hs=0.1;vs=0.1} @Origin
  - effect:blockmask{m=blackstone;r=2;d=20} @PlayersNearOrigin{r=2}


wisperwood-boss-passive:
  Skills:
  - randomskill{s=wisperwood-boss-passive-within,wisperwood-boss-passive-notwithin}
wisperwood-boss-passive-within:
  Conditions:
  - variableEquals{var=caster.passive;value=1}  
  - playerwithin 8
  Skills:
  - skill{s=wisperwood-boss-passive-within-message}
  - command{c="runicdamage <caster.uuid> <target.name> 50"} @PIR{r=16}
  - potion{t=SLOW;d=80;l=2} @PIR{r=16}
  - setvariable{var=caster.passive;v=0}
wisperwood-boss-passive-notwithin:
  Conditions:
  - variableEquals{var=caster.passive;value=0}
  - playernotwithin 8
  Skills:
  - skill{s=wisperwood-boss-passive-notwithin-message}
  - command{c="runicdamage <caster.uuid> <target.name> 75"} @PIR{r=16}
  - potion{t=SLOW;d=80;l=2} @PIR{r=16}
  - setvariable{var=caster.passive;v=1}
wisperwood-boss-passive-within-message:
  Cooldown: 2
  Skills:
  - message{m="&7[1/2] &cLomi Elder<&co> &eYou dare enter MY Domain?!"} @PIR{r=8}
wisperwood-boss-passive-notwithin-message:
  Cooldown: 2
  Skills:
  - message{m="&7[2/2] &cLomi Elder<&co> &eHow dare you leave MY Domain after entering?!"} @PIR{r=12}

wisperwood-warrior-night:
  Conditions:
  - night{} true
  Skills:
