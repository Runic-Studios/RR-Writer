# BOSS-KILL BARS/MESSAGES

SpawnWithCustomisableBossBar:
  Skills:
  - barcreate{name="BossKillBar";display="&1&lClick to claim kill";value=1;color=BLUE;style=SEGMENTED_10}	

CreateKillBossBar:
  Conditions:
  - varEquals{var=caster.killClaimed;value="true"} castinstead KillClaimedMessage	
  - varEquals{var=caster.killClaimed;value="false"}	
  Skills:
  - barset{name="BossKillBar";display="&1&lKilled by - <trigger.name>";value=0}	
  - setvariable{var=caster.killClaimed;type=STRING;value="true"}	
  #- barcreate{name="BossKillBar";display="&1Killed by - <trigger.name>";value=0;color=BLUE;style=SEGMENTED_10}

BecomeKillOwner:
  Conditions:
  - varEquals{var=caster.ownerName;value="NONE"}	
  Skills:
  - setowner	
  - setvariable{var=caster.ownerName;type=STRING;value="<trigger.name>";save=true}	
  - message{m="&aYou have successfully claimed this kill!"}	
  - effect:sound{s=entity.player.levelup;v=2}	

DisplayOwner:
  Conditions:
  - varEquals{var=caster.ownerName;value="NONE"} castinstead BecomeKillOwner	
  - varEquals{var=caster.ownerName;value="NONE"} false	
  Skills:
  - message{m="&cThis boss was slain by <caster.var.ownerName>"} @PIR{r=10}	
  - effect:sound{s=entity.zombie_pigman.angry;v=10} @owner

KillClaimedMessage:
  Conditions:
  - varEquals{var=caster.killClaimed;value="true"}	
  Skills:
  - message{m="&cSomeone has already claimed this kill!"} @PIR{r=5}	

