ValoranSpawnnotwithin:
 Conditions:
 - playernotwithin 16
 - variableEquals{var=caster.valoran;value=1}
 Skills:
 - remove @MIR{r=128;t=Valoran,Gorm,Bjorn}
 - summon{type=Valoran;amount=1;radius=0}
 - message{m="&cYou have left the arena."} @PIR{r=28}
 - setvariable{var=caster.valoran;value=0} @self
ValoranSpawnremove:
 Conditions:
 - playernotwithin 32
 Skills: 
 - remove @self
 - remove @MIR{r=128;t=Valoran,Gorm,Bjorn}

Spin:
 Skills:
 - orbital{onTick=SpinTick;onHit=SpinHit;p=12;i=2;d=24;r=3;oy=1} @self

SpinTick:
 Skills:
 - effect:particles{p=crit;a=10;hS=0.1;vS=0.1} @origin

SpinHit:
 Skills:
 - command{c="runicdamage <caster.uuid> <target.name> 50"}
 - throw{velocity=10;velocityY=2} @trigger

CastingEffect:
 Skills:
 - effect:particles{p=damageIndicator;a=10;hS=0.2;vS=0.2;y=1} @self

