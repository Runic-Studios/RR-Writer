gladeBandit-quest:
  Cooldown: 9999
  Skills:
  - skill{s=gladeBandit-quest1}

gladeBandit-quest1:
  Skills:
  - setvariable{var=caster.alive;value=0}
  - signal{s=alive} @MIR{t=gladeBandit,gladeBanditRider;r=20}
  - delay 10
  - skill{s=gladeBandit-questtrigger}
  - delay 10
  - skill{s=gladeBandit-quest1}

gladeBandit-quest-alive:
  Skills:
  - setvariable{var=caster.alive;value=1}
  
gladeBandit-questtrigger:
  Conditions:
  - variableEquals{var=caster.alive;value=0}   
  Skills:
  - command{c="questtrigger player <target.name> goldenvillagertrigger1"} @PIR{r=20} 
  - remove @self

gladeBullHurt:
  Cooldown: 5
  Skills:
  - sound{s=entity.cow.hurt;volume=3;0.1} @self 

gladeBullChargeStart:
  Skills:
  - onDamaged{auraName=kbResist;d=50;onHit=kbResistGladeBull} @self 
  - potion{type=SLOW;duration=80;level=2;hasParticles=false} @self
  - cast{
        skillName="&aMighty Charge";
        duration=40;
        onCast=gladeBullCharge;
        cancelOnMove=false;
        showCastBar=true
      } @target
kbResistGladeBull:
  Skills:
  - particles{p=flame;amount=10;hS=0.4;
  - velocity{m=set;x=0;y=0;z=0} @self


gladeBullCharge:
  Cooldown: 10
  Skills:
  - throw{velocity=15;velocityY=2} @PlayersInRadius{r=2}
  - command{c="runicdamage <caster.uuid> <target.name> 250"} @PIR{r=2}
  - effect:explosion @self
  - leap{velocity=300} @target
  - delay 5
  - command{c="runicdamage <caster.uuid> <target.name> 150"} @PIR{r=2}
  - delay 2
  - throw{velocity=15;velocityY=2} @PlayersInRadius{r=2}

gladeRabbitBurrow:
  Skills:
  - potion{type=SLOW;duration=30;level=10;hasParticles=false} @self
  - particles{p=block_crack;m=DIRT;amount=10;hS=0.4;repeat=15;repeatInterval=2} @self
  - delay 30
  - potion{type=INVISIBILITY;duration=120;level=2;hasParticles=false} @self
  - delay 90
  - potion{type=SLOW;duration=30;level=10;hasParticles=false} @self
  - particles{p=block_crack;m=DIRT;amount=10;hS=0.4;repeat=15;repeatInterval=2} @self
  - delay 30

crossbowStart:
  Conditions:
  - mounted true
  - incombat true
  Skills:
  - sound{s=item.crossbow.loading_start;p=0.3} @self
  - delay 15
  - sound{s=item.crossbow.loading_middle;p=0.3} @self
  - delay 25
  - sound{s=item.crossbow.loading_end} @self
  - delay 20
  - sound{s=item.crossbow.hit } @self
  - skill{s=crossbowShot} @target

crossbowShot:
  Skills:
  - projectile{bulletType=ARROW;onTick=crossbowShot-Tick;onHit=crossbowShot-Hit;v=14;i=1;hR=1;vR=1;hnp=false;tyo=1}
crossbowShot-Tick:
  Skills:
  - effect:particles{p=CAMPFIRE_COSY_SMOKE;amount=3;speed=0;hS=0.1;vS=0.1} @origin
crossbowShot-Hit:
  Skills:
  - command{c="runicdamage <caster.uuid> <target.name> 175"}
  
riderIsDead:
  Skills:
  - potion{type=SPEED;duration=110;level=2;p=false} @self
  - runaigoalselector{goal=clear}
  - runaigoalselector{goal=fleeplayers}
  - runaigoalselector{goal=randomstroll}
  - delay 40
  - remove @self
  
