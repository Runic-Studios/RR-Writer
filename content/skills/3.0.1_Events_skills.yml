frost-event-countdown-timer-damage:
  Conditions:
  - variableEquals{var=caster.pause;value=0}
  Skills:
  - damage{a=1;i=true} @self ~onTimer:20
frost-event-countdown-wave-pause:
  Skills:
  - message{m="&dThe Wave Countdown has been &lpaused&r&d!"} @PIR{r=64}
  - setvariable{var=caster.pause;value=1}
frost-event-countdown-wave-unpause:
  Skills:
  - message{m="&dThe Wave Countdown has been &lunpaused&r&d!"} @PIR{r=64}
  - setvariable{var=caster.pause;value=0}

frost-event-countdown-timer:
  Skills:
  - summon{t=frost-event-countdown-timer}
  - damage{a=1;i=true}
  - variableadd{var=caster.wave;amount=1}
  - skill{s=frost-event-wave}
frost-event-countdown-timer-remove:
  Conditions:
  - health{h=<1}
  Skills:
  - signal{s=countdown} @MIR{t=frost-event-timer;r=32}
  - remove
frost-event-countdown-wave-skip:
  Skills:
  - message{m="&dThe Wave Countdown has been &lskipped&r&d!"} @PIR{r=64}
  - signal{s=countdown} @MIR{t=frost-event-timer;r=32}
  - remove
frost-event-countdown-wave-clear-and-skip:
  Skills:
  - remove @MIR{t=frost-event-enemy-1,frost-event-enemy-2,frost-event-enemy-3,frost-event-enemy-4,frost-event-enemy-5,frost-event-enemy-6,frost-event-enemy-7;r=128} ~onSpawn
  - message{m="&dThe current Wave has been &lcleared &r&dand &lskipped&r&d!"} @PIR{r=64}
  - signal{s=countdown} @MIR{t=frost-event-timer;r=32}
  - remove

frost-event-countdown-wave-delay-10:
  Skills:
  - message{m="&dThe Wave Countdown has been delayed by &l10 &r&dseconds!"} @PIR{r=64}
  - heal{a=10;i=true}
frost-event-countdown-wave-delay-25:
  Skills:
  - message{m="&dThe Wave Countdown has been delayed by &l25 &r&dseconds!"} @PIR{r=64}
  - heal{a=25;i=true}
frost-event-countdown-wave-delay-60:
  Skills:
  - message{m="&dThe Wave Countdown has been delayed by &l60 &r&dseconds!"} @PIR{r=64}
  - heal{a=60;i=true}

frost-event-timer:
  Conditions:
  - health{h=<1}
  Cooldown: 9999
  Skills:
  - message{m="&c&lFinal Wave!"} @PIR{r=64}
  - remove @MIR{t=frost-event-countdown-timer;r=32}
  - remove

