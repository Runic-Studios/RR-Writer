hobSmashcheckwithin:
  Conditions:
  - playerwithin 6
  - incombat{}
  Cooldown: 1
  Skills:
  - variableadd{var=caster.hob;amount=1}	 
hobSmashchecknotwithin:
  Conditions:
  - playernotwithin 6
  Skills:
  - setvariable{var=caster.hob;value=0}
hobSmash:
  Conditions:
  - varinrange{var=caster.hob;value=>5}
  - incombat{}
  Cooldown: 8
  Skills:
  - setvariable{var=caster.tnt;value=0}
  - potion{t=SLOW;d=40;l=1;hasParticles=false} 
  - cast{skillName="Hob Smash";duration=40;onCast=hobSmashCast;showCastBar=true} @self
hobSmashCast:
  Skills:
  - throw{vy=12} @PIR{r=5}
  - potion{t=SLOW;d=80;l=3} @PIR{r=5}
  - command{c="runicdamage <caster.uuid> <target.name> 200"} @PIR{r=5}
  - sound{s=block.grass.break} 
  - blockmask{m=dirt;d=40;r=5}
