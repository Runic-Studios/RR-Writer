EldridSignalDialogue:
  Skills:
  - summon{t=EldridSignalWalk} @self
  - delay 80
  - message{m="&7[1/16] &7After that, she put her hand on my chest. &7And &7everything &7went &7numb &7in &7my &7body."}
  - delay 80
  - summon{t=EldridSignalFreeze} @self
  - message{m="&7[2/16] &7I couldn't feel my legs, &7then my head was getting cold."}
  - delay 40
  - message{m="&7[3/16] &7I want to know... &7how can we fix this?"}
  - delay 40
  - message{m="&7[4/16] &7So many questions, &7yet I cannot do anything."}
  - delay 80
  - message{m="&7[5/16] &6???<&co> &bYour &bwishes, &bthey &bare &btoo &bdangerous. &bI &bpity &byou. &bIt &bdidn't &bhave &bto &bbe &bthis &bway, &bit's &bno &bone's &bfault. &bThis &bis &bfor &bthe &bboth &bof &bus. &bThese &bwishes, &bthey &bwill &bbe &bfrozen &bin &btime."}
  - delay 120
  - message{m="&7[6/16] &7Am I still in everyone's minds?"}
  - delay 40
  - message{m="&7[7/16] &7&6???<&co> &bThe &bpeople &byou &bthink &babout, &bthey &bare &balready &blong &bgone."}
  - delay 80
  - message{m="&7[8/16] &7Is this a curse I have to bear?"}
  - delay 40
  - message{m="&7[9/16] &6???<&co> &bIt's &bwhatever &byou &bwant &bit &bto &bbe."}
  - delay 80
  - message{m="&7[10/16] &7Did I do well?"}
  - delay 20
  - message{m="&7[11/16] &6???<&co> &bYes."}
  - delay 40
  - message{m="&7[12/16] &7That's when I realized, my efforts weren't &7in &7vain, &7I &7had &7accomplished &7what &7I &7wanted. &7And &7this &7curse &7is &7my &7reward &7for &7that."}
  - delay 80
  - message{m="&7[13/16] &7I'll lose my mind, my feelings and conscience. &7Everything &7will &7be &7frozen."}
  - delay 80
  - message{m="&7[14/16] &7So be it, I said."}
  - delay 40
  - message{m="&7[15/16] &6???<&co> &bThank you, your wishes will not vanish."}
  - delay 40
  - message{m="&7[16/16] &7And so, the journey ended."}
  - summon{t=EldridSignalFrozen} @self
  - delay 120
  - summon{t=EldridQuestTeleport}
  - remove @MIR{t=EldridQuest2;r=32}
  - remove @MIR{t=ArcticDemonQuest2;r=32}
  - remove @self
