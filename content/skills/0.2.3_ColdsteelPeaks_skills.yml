coldsteel-peak-boss-skill-check:
  Skills:
  - randomskill{s=coldsteel-peak-boss-skill-within,coldsteel-peak-boss-skill-notwithin}
coldsteel-peak-boss-skill-within:
  Conditions:
  - playerwithin 5
  Skills:
  - leap{v=250} @Forward{f=-5;y=4}
coldsteel-peak-boss-skill-notwithin:
  Conditions:
  - playernotwithin 5
  Skills:
  - leap{v=250} @Forward{f=5;y=2.5}

coldsteel-peak-boss-proj-tick:
  Skills:
  - effect:particles{p=snowballpoof;c=#A8FFFF;a=1;speed=0;hS=0.2;vS=0.2} @Origin
coldsteel-peak-boss-proj-hit:
  Skills:
  - command{c="runicdamage <caster.uuid> <target.name> 20"} @PlayersNearOrigin{r=2}
  #- potion{type=SLOW;duration=60;lvl=2} @PlayersNearOrigin{r=5}
  - effect:blockmask{m=ice;r=1;d=20} @PlayersNearOrigin{r=2}
coldsteel-peak-boss-proj-end:
  Skills:
  - command{c="runicdamage <caster.uuid> <target.name> 5"} @PIR{r=5} 
  - potion{t=SLOW;d=40;l=1} @PIR{r=5}
