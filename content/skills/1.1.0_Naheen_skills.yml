UppercutCast:
  Skills:
  - cast{skillName="Uppercut";duration=30;onCast=UppercutPlayer;onStart=Uppercut-Start;onInterrupted=Uppercut-Start}

UppercutPlayer:
  Skills:
  - leap{v=200} @target
  - delay 5
  - command{c="runicdamage <caster.uuid> <target.name> 50"} @PIR{r=3;sort=NEAREST}
  - throw{velocity=1;velocityY=10} @PIR{r=3;sort=nearest}
  - effect:sound{s=block.bamboo.break} @self

Uppercut-Start:
  Skills:
  - effect:smokeswirl{d=3;i=5} @self
  - effect:sound{s=mob.endermen.scream} @self

Assassinate:
  Skills:
  - sendtitle{title="&4&kooo&r&l&cAssassinate&r&4&kooo";subtitle="&e&l1";d=20} @PlayersInRadius{r=10}
  - effect:sound{s=block.comparator.click;volume=1.0;pitch=0.5} @self
  - delay 20
  - skill{s=AssassinateTarget}

AssassinateTarget:
  Conditions:
  - targetwithin{d=3} castinstead CompleteAssassination
  Skills:
  - leap{v=200} @target

CompleteAssassination:
  Skills:
  - teleport{sh=0;sv=0} @PIR{r=3;sort=nearest}
  - delay 1
  - command{c="runicdamage <caster.uuid> <target.name> 80"} @PIR{r=2;sort=nearest}
