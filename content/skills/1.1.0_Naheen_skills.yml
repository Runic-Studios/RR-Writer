boomerExplosion: #make the trigger a "~onTimer:20" or something (because the ability is passive)
 Conditions:
 - playerwithin{d=2} true
 - incombat{} true
 Skills:
 - remove @self
 - effect:explosion @self
 - effect:particle{p=explosion_huge} @self
 - command{c="runicdamage <caster.uuid> <target.name> 80"} @LivingEntitiesInRadius{r=8} #use "@LivingEntitiesInRadius{r=6}" if you want ALL entities (including all mobs)

unstableSlimePoison: #make the trigger a "~onTimer:10" or something (because the ability is passive and should have faster response)
 Skills:
 - effect:particles{particle=happy_villager;amount=3;hS=.5;vS=1;speed=1} @self
 - potion{type=POISON;duration=60;level=4} @PIR{r=5}

unstableSlimeDeath: #make the trigger a "~onDeath"
 Skills:
 - effect:explosion @self
 - command{c="runicdamage <caster.uuid> <target.name> 30"} @LivingEntitiesInRadius{r=4} #use "@LivingEntitiesInRadius{r=4}" if you want ALL entities (including all mobs)

