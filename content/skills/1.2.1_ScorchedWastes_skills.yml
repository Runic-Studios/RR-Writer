ToxicSlime-jump:
  Conditions:
  - incombat{}
  Cooldown: 2
  Skills:
  - jump{v=0.45}

SkullHunter:
  Conditions:
  - incombat{}
  Skills:
  - skill{s=SkullHunterBash} 
  - skill{s=SkullHunterAxe} 
  - skill{s=SkullHunter-within} 
  - skill{s=SkullHunter-notwithin} 
SkullHunter-within:
  Conditions:
  - playerwithin 4
  Cooldown: 1
  Skills:
  - variableadd{var=caster.bash;amount=1}	
  - variablesubtract{var=caster.axe;amount=1}
SkullHunter-notwithin:
  Conditions:
  - playernotwithin 6
  Cooldown: 1
  Skills:
  - variableadd{var=caster.axe;amount=1}	 
  - variablesubtract{var=caster.bash;amount=1}
SkullHunterBash:
  Conditions:
  - varinrange{var=caster.bash;value=>5}
  Cooldown: 8
  Skills:
  - potion{t=SLOW;d=30;l=1;hasParticles=false} @self
  - cast{skillName="Skull Crusher";duration=30;onCast=SkullHunterBashcast;showCastBar=true} @target
SkullHunterBashcast:
  Skills:
  - potion{t=SLOW;d=30;l=10;hasParticles=false} @self
  - summon{t=SkullHunter-marker} @Forward{f=2;y=0}
  - setvariable{var=caster.bash;value=0}
  - setvariable{var=caster.axe;value=0}
SkullHunter-marker:
  Skills:
  - sound{s=item.axe.strip} 
  - potion{t=SLOW;d=80;l=10} @PIR{r=2}
  - command{c="runicdamage <caster.uuid> <target.name> 80"} @PIR{r=2}
  - effect:blockmask{m=coal_block;r=2;d=20}
  - remove

SkullHunterAxe:
  Conditions:
  - varinrange{var=caster.axe;value=>8}
  Cooldown: 12
  Skills:
  - cast{skillName="Roped Axe";duration=30;onCast=SkullHunterAxecast;showCastBar=true} @target
SkullHunterAxecast:
  Skills:
  - equip{i=AIR:OFFHAND}
  - effect:sound{s=item.axe.strip;v=2;p=0.1}
  - projectile{ot=SkullHunterAxe-Tick;oh=SkullHunterAxe-Hit;v=16;hr=1;vr=1;i=1} @target
  - effect:sound{s=item.axe.strip;v=2;p=0.1}
  - setvariable{var=caster.bash;value=0}
  - setvariable{var=caster.axe;value=0}
  - delay 20
  - equip{i=GOLDEN_AXE:OFFHAND}
  
SkullHunterAxe-Tick:
  Skills:
  - effect:particles{particle=item_crack;material=coal_block;a=1;d=5;v=0;yo=0} @origin
  
SkullHunterAxe-Hit:
  Skills:
  - command{c="runicdamage <caster.uuid> <target.name> 80"}
  - throw{vy=2}
  - delay 2
  - pull{v=8} 
  - potion{t=SLOW;d=40;l=3}
  - effect:sound{s=entity.fishing_bobber.retrieve}



SkullWalker:
  Cooldown: 8
  Skills:
  - sound{s=entity.skeleton.hurt}
  - command{c="runicdamage <caster.uuid> <target.name> 2"} @target
  - potion{t=SLOW;d=40;l=1} @target
  - summon{t=SkullWalker-spawn;r=2} @target
SkullWalker-spawn:
  Skills:
  - delay 40
  - sound{s=entity.skeleton.ambient} 
  - potion{t=SLOW;d=80;l=3} @PIR{r=2}
  - command{c="runicdamage <caster.uuid> <target.name> 40"} @PIR{r=2}
  - effect:particlesphere{p=block_crack;material=bone_block;amount=4;radius=2;yOffset=.5} 
  - remove
  
