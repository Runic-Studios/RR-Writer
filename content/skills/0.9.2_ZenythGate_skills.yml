  - delay 20
  - potion{type=SLOW;duration=80;level=3;hasParticles=false}
  - sound{s=block.sand.break} 
  - effect:particlesphere{particle=block_crack;material=sand;amount=40;radius=6;yOffset=.5}
  - summon{t=MaskedFigureClone;a=1;os=true} @Ring{r=6;p=5}
MaskedFigure-cloner:
  Skills:
  - delay 200
  - sound{s=block.sand.break} 
  - effect:particlesphere{particle=block_crack;material=sand;amount=5;radius=1;yOffset=.5}
  - remove

Zenythwithin:
  Cooldown: 1
  Conditions:
  - playerwithin 6
  Skills:
  - variableadd{var=caster.spin;amount=1} 

ZenythSpin:
  Cooldown: 8
  Conditions:
  - varinrange{var=caster.spin;value=>5}
  Skills:
  - potion{type=SLOW;duration=50;level=1;hasParticles=false} @Self
  - cast{skillName="Spin Attack";duration=30;onCast=ZenythSpinCast;showCastBar=true} @target
  - delay 80

ZenythSpinCast:
  Skills:
  - effect:particlering{particle=crit;radius=4;points=32;amount=5;hS=1;vS=0} @self
  - command{c="runicdamage <caster.uuid> <target.name> 80"} @PIR{r=4}
  - throw{velocity=7;velocityY=4} @PIR{r=4}
  - delay 10
  - setvariable{var=caster.spin;value=0}

