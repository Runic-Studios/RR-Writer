UndeadMinerTNTcheckwithin:
  Conditions:
  - playerwithin 6
  - incombat{}
  Cooldown: 1
  Skills:
  - variableadd{var=caster.tnt;amount=1}	 
UndeadMinerTNTchecknotwithin:
  Conditions:
  - playernotwithin 6
  Skills:
  - setvariable{var=caster.tnt;value=0}
UndeadMinerTNT:
  Conditions:
  - varinrange{var=caster.tnt;value=>8}
  - incombat{}
  Cooldown: 16
  Skills:
  - setvariable{var=caster.tnt;value=0}
  - delay 60
  - potion{t=SLOW;d=20;l=1;hasParticles=false} 
  - cast{skillName="Dynamite";duration=40;onCast=UndeadMinerTNTCast;showCastBar=true} @self
  - delay 20
  - potion{t=SLOW;d=40;l=10;hasParticles=false} 
  - delay 40
  - potion{t=SPEED;d=20;l=1;hasParticles=false} 
UndeadMinerTNTCast:
  Skills:
  - summon{t=UndeadMinerTNT} 
UndeadMinerTNTIgnite:
