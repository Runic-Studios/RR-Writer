# Awakened Shrub #
  
Awakened_Shrub_Attack:
  Cooldown: 4
  Conditions:
  - offgcd
  - targetwithin{d=4} true
  Skills:
  - gcd{ticks=32}
  - setAI{ai=false} @self
  - setAI{ai=true;delay=32} @self
  - state{s=skill;li=2;lo=3} @self
  - delay 18
  
  - effect:sound{s=entity.zombie.infect;volume=1;pitch=1} @self
  - effect:particles{particle=redstone;color=#03ab65;size=0.8;amount=40;hS=0.7;vS=0.4;y=1;speed=0;forwardOffset=0;sideOffset=0} @self
  - totem{md=2;c=1;oH=Awakened_Shrub_Attack_DAMAGE;hnp=false;hp=true;hR=3;vR=2;i=1} @selflocation
  
Awakened_Shrub_Attack_DAMAGE:
  TargetConditions:
  - isblocking false
  Skills:
  - damage{a=1;pkb=false;hnp=false;hp=true;repeat=3;repeatinterval=20}
  - effect:particles{particle=redstone;color=#03ab65;size=0.6;amount=35;hS=0.25;vS=0.8;y=0.7;speed=0;forwardOffset=0;sideOffset=0;repeat=7;repeatinterval=10}
  - effect:sound{s=entity.player.hurt_sweet_berry_bush;volume=0.8;pitch=0.8;repeat=3;repeatinterval=20}
  
Awakened_Shrub_Hit:
  Cooldown: 1
  Skills:
  - effect:sound{s=entity.player.hurt_on_fire;volume=0.4;pitch=0.6} @self

