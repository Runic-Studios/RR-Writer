  - setAI{ai=true}
  - delay 25
  - setAI{ai=true}
  - delay 175
  - potion{t=SPEED;d=100;l=1;hasParticles=false}
  - delay 100
  - remove 

herbalism-event-rise-visual:
  Skills:
  - effect:particlesphere{p=spell_instant;amount=2;radius=1;yOffset=0.25}
  - delay 20
  - skill{s=herbalism-event-rise-visual}
herbalism-spawn:
  Skills:
  - setvariable{var=caster.loot;value=0}
  - skill{s=herbalism-event-rise2} .025
  - potion{t=SLOW;d=20;l=10;hasParticles=false}
  - delay 20
  - setAI{ai=false}


