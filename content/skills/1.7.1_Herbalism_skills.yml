herbalism-event-ambush:
  Cooldown: 1200
  Skills:
  - delay 24000
  - potion{t=BLINDNESS;d=40;l=1;hasParticles=false} @self 
  - potion{t=SLOW;d=40;l=2;hasParticles=false} @self
  - sound{s=block.grass.break} @self
  - message{m="&7[1/3] &6Flower Escapee<&co> &eWe have come to avenge our fallen comrades!"} @self
  - randomskill{s=ValerianGiver-ambush,ComfreyGiver-ambush,BoswelliaGiver-ambush,TurmericGiver-ambush,ChamomileGiver-ambush,SnowdropGiver-ambush,HibiscusGiver-ambush,WintercressGiver-ambush,PsylliumGiver-ambush,ArugulaGiver-ambush,PetuniaGiver-ambush}  @self
  - delay 5
  - randomskill{s=ValerianGiver-ambush,ComfreyGiver-ambush,BoswelliaGiver-ambush,TurmericGiver-ambush,ChamomileGiver-ambush,SnowdropGiver-ambush,HibiscusGiver-ambush,WintercressGiver-ambush,PsylliumGiver-ambush,ArugulaGiver-ambush,PetuniaGiver-ambush}  @self
  - delay 5
  - randomskill{s=ValerianGiver-ambush,ComfreyGiver-ambush,BoswelliaGiver-ambush,TurmericGiver-ambush,ChamomileGiver-ambush,SnowdropGiver-ambush,HibiscusGiver-ambush,WintercressGiver-ambush,PsylliumGiver-ambush,ArugulaGiver-ambush,PetuniaGiver-ambush}  @self
  - delay 5
  - randomskill{s=ValerianGiver-ambush,ComfreyGiver-ambush,BoswelliaGiver-ambush,TurmericGiver-ambush,ChamomileGiver-ambush,SnowdropGiver-ambush,HibiscusGiver-ambush,WintercressGiver-ambush,PsylliumGiver-ambush,ArugulaGiver-ambush,PetuniaGiver-ambush}  @self
  - delay 5
  - randomskill{s=ValerianGiver-ambush,ComfreyGiver-ambush,BoswelliaGiver-ambush,TurmericGiver-ambush,ChamomileGiver-ambush,SnowdropGiver-ambush,HibiscusGiver-ambush,WintercressGiver-ambush,PsylliumGiver-ambush,ArugulaGiver-ambush,PetuniaGiver-ambush}  @self
  - delay 100
  - message{m="&7[2/3] &6Flower Escapee<&co> &eWe're no match! Run away!"} @self
  - delay 40
  - message{m="&7[3/3] &6Flower Escapee<&co> &eDarn our frail fragile bodies!"} @self

