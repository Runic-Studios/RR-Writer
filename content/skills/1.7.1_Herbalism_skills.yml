herbalism-event:
  Conditions:
  - variableEquals{var=caster.loot;value=0} 
  Skills:
  - skill{s=herbalism-event-rise-cast} .004
herbalism-event-rise-cast:
  Skills:
  - summon{t=herbalism-event-rise-timer} @self  
herbalism-event-rise-timer-cast:
  Skills:
  - message{m="&6[EVENT] &eThe flowers grew legs and are &etrying &eto &eescape!"} @PIR{r=50}
  - message{m="&eFlowers with legs are &brare &eand worth &bfive times &emore!"} @PIR{r=50}
  - sound{s=block.grass.break;v=2} @self
  - signal{s=rise} @MIR{t=ValerianGiver,ComfreyGiver,BoswelliaGiver,TurmericGiver,ChamomileGiver,SnowdropGiver,HibiscusGiver,WintercressGiver,PsylliumGiver,ArugulaGiver,LavenderGiver,PetuniaGiver;r=100}
  - delay 300
  - sound{s=block.grass.break;v=2} @self
  - signal{s=rise2} @MIR{t=ValerianGiver,ComfreyGiver,BoswelliaGiver,TurmericGiver,ChamomileGiver,SnowdropGiver,HibiscusGiver,WintercressGiver,PsylliumGiver,ArugulaGiver,LavenderGiver,PetuniaGiver;r=100}
  - delay 20
  - setvariable{var=caster.active;value=0} @self

herbalism-event-remove:
  Conditions:
  - variableEquals{var=caster.active;value=0}
  Skills:
  - setvariable{var=caster.remove;value=1}
  - signal{s=check} @MIR{t=ValerianGiver,ComfreyGiver,BoswelliaGiver,TurmericGiver,ChamomileGiver,SnowdropGiver,HibiscusGiver,WintercressGiver,PsylliumGiver,ArugulaGiver,LavenderGiver,PetuniaGiver;r=100}
  - delay 10
  - skill{s=herbalism-event-remove-cast}
herbalism-event-remove-cast:
  Conditions:
  - variableEquals{var=caster.remove;value=1}
  Skills:
  - message{m="&6[Event] &e&lFlower Escape! &r&ehas concluded with no flowers remaining!"} @PIR{r=50}
  - remove

herbalism-event-rise:
  Cooldown: 60
  Skills:
  - effect:particlesphere{p=block_crack;m=dirt;amount=2;radius=1;yOffset=0.5}
  - jump{v=0.4}
  #- potion{t=GLOWING;c=WHITE;d=400;l=1;hasParticles=false}
  - setvariable{var=caster.loot;value=1}
  - skill{s=herbalism-event-rise-visual}
  - setAI{ai=true}
  - delay 25
  - setAI{ai=true}
  - delay 175
  - potion{t=SPEED;d=100;l=1;hasParticles=false}
  - delay 200
  - potion{t=SPEED;d=100;l=2;hasParticles=false}
  - delay 200
  - effect:particlesphere{p=block_crack;m=dirt;amount=2;radius=1;yOffset=0.5}
  - remove 

herbalism-event-rise2:
  Cooldown: 60
