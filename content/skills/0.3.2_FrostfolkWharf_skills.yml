FrostfolkFisherman:
  Conditions:
  - incombat{}
  Skills:
  - skill{s=FrostfolkFisherman-within}
  - skill{s=FrostfolkFisherman-notwithin}
  - skill{s=FrostfolkFisherman-sorrow}
FrostfolkFisherman-notwithin:
