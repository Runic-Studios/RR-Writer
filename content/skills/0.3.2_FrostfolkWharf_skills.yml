  - playernotwithin 6
  - incombat{}
  Cooldown: 1
  Skills:
  - setvariable{var=caster.cast;value=0}
FrostfolkFisherman-within:
  Conditions:
  - playerwithin 6
  Skills:
  - variableadd{var=caster.cast;amount=1}	 
FrostfolkFisherman-sorrow:
  Conditions:
  - varinrange{var=caster.cast;value=>3}
