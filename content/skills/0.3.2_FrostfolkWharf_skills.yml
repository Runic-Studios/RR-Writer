Frostfolk:
  Conditions:
  - incombat{}
  Skills:
  - skill{s=FrostfolkSpirit}
  - skill{s=Frostfolk-passive}
  - skill{s=Frostfolk-passive} <40%
Frostfolk-passive:
  Skills:
  - summon{t=Frostfolk-marker5;r=24;a=2}
FrostfolkSpirit:
  Cooldown: 8
  Skills:
  - skill{s=Frostfolk-melee}
  - skill{s=Frostfolk-range}
Frostfolk-melee:
  Conditions:
  - playerwithin 5
  Cooldown: 20
  Skills:
  - potion{t=SLOW;d=120;l=3;hasParticles=false}
  - cast{skillName="Frigid Fear";duration=40;onCast=Frostfolk-meleecast;showCastBar=true} @self
  - sound{s=block.snow.break;v=2}
  - effect:particles{particle=block_crack;m=snow_block;a=5}
  - delay 20
  - sound{s=block.snow.break;v=2}
  - effect:particles{particle=block_crack;m=snow_block;a=5}
  - delay 20
  - sound{s=block.snow.break;v=2}
  - effect:particles{particle=block_crack;m=snow_block;a=5}
Frostfolk-meleecast:
  Skills:
  - summon{t=Frostfolk-marker8} @self
  - delay 60
  - summon{t=Frostfolk-marker6} @Ring{r=12;p=8}
Frostfolk-range:
