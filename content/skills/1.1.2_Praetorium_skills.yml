  #- setvariable{var=caster.altar;value=1}

praetorium-altar:
  Conditions:
  - playerwithin 8
  Cooldown: 2
  Skills:
  - randomskill{skills=praetorium-altar1,praetorium-altar2}
  - variableadd{var=caster.altar;amount=1}
praetorium-altar1:
  Conditions:
  - variableEquals{var=caster.altar;value=1}
  Skills:
  - message{m="&eDo you wish to challenge all five Imperial Elites at once?"} @PIR{r=38}
  - message{m="&eThe time limit is 5 minutes."} @PIR{r=38}
  - message{m="&eYou could earn &7Silver Medals&e or even &6Legendary&e weapons."} @PIR{r=38}
  - delay 200
  - skill{s=praetorium-altar-reset}
praetorium-altar2:
  Conditions:
  - variableEquals{var=caster.altar;value=2}
  Skills:
  - remove @MIR{t=praetorium-altar-archer,praetorium-altar-cleric,praetorium-altar-mage,praetorium-altar-rogue,praetorium-altar-warrior,praetorium-altar-timer;r=256}
  - setvariable{var=caster.archer;value=0}
  - setvariable{var=caster.cleric;value=0}
  - setvariable{var=caster.mage;value=0}
  - setvariable{var=caster.rogue;value=0}
  - setvariable{var=caster.warrior;value=0}
  - message{m="&eGood luck."} @PIR{r=38} 
  - delay 20
  - sound{s=block.comparator.click;v=3}
  - message{m="&e3"} @PIR{r=38} 
  - delay 20
  - sound{s=block.comparator.click;v=3}
  - message{m="&e2"} @PIR{r=38} 
  - delay 20
  - sound{s=block.comparator.click;v=3}
  - message{m="&e1"} @PIR{r=38} 
  - delay 20
  - sound{s=entity.ender_dragon.growl;v=3}
  - message{m="&eForfeit with everyone leaving the arena."} @PIR{r=38} 
  - summon{t=praetorium-altar-timer} @Forward{f=0;y=1}
  - summon{t=praetorium-altar-archer} @Location{c=2140,110,-421.3}
  - summon{t=praetorium-altar-cleric} @Location{c=2140,110,-417.7}
  - summon{t=praetorium-altar-mage} @Location{c=2143,110,-416.6}
  - summon{t=praetorium-altar-rogue} @Location{c=2145,110,-419.5}
  - summon{t=praetorium-altar-warrior} @Location{c=2143,110,-422.3}
  - setvariable{var=caster.forfeit;value=0}
  - delay 6000
  - setvariable{var=caster.altar;value=1}

