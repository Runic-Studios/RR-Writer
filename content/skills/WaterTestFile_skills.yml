drifter-message1:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>7<&rb> &6Drifter<&co> &cI do not understand you."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>2<&fs>7<&rb> &6Drifter<&co> &cI wish to understand you."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>3<&fs>7<&rb> &6Drifter<&co> &cIt's tricky. I know."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>4<&fs>7<&rb> &6Drifter<&co> &cIt may be selfish of me."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>5<&fs>7<&rb> &6Drifter<&co> &cBut what am I to do?"} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>6<&fs>7<&rb> &6Drifter<&co> &cHere's the deal, you might not realize."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>7<&fs>7<&rb> &6Drifter<&co> &cYou mean a lot more than you think."} @PIR{r=50}

drifter-message2:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>4<&rb> &6Drifter<&co> &cTo me, to everyone, to those around you."} @PIR{r=50}
  - delay 35
  - message{cooldown=4;m="&7<&lb>2<&fs>4<&rb> &6Drifter<&co> &cI don't know how to say it."} @PIR{r=50}
  - delay 35
  - message{cooldown=4;m="&7<&lb>3<&fs>4<&rb> &6Drifter<&co> &cThis is my way of telling you."} @PIR{r=50}
  - delay 35
  - message{cooldown=4;m="&7<&lb>4<&fs>4<&rb> &6Drifter<&co> &cI have a lot of things to say to you."} @PIR{r=50}

drifter-message3:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>4<&rb> &6Drifter<&co> &cEven if you didn't mean to or didn't realize it."} @PIR{r=50} #Remove if going to live
  - delay 35
  - message{cooldown=4;m="&7<&lb>2<&fs>4<&rb> &6Drifter<&co> &cYou've been an integral part in my life."} @PIR{r=50}  #Remove if going to live
  - delay 35
  - message{cooldown=4;m="&7<&lb>3<&fs>4<&rb> &6Drifter<&co> &cThat's not an understatement."} @PIR{r=50} #Remove if going to live
  - delay 35
  - message{cooldown=4;m="&7<&lb>4<&fs>4<&rb> &6Drifter<&co> &cI wish only the best for you."} @PIR{r=50} 
    
drifter-message4:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>3<&rb> &6Drifter<&co> &cI wish I could do more for you like you've done for me."} @PIR{r=50}
  - delay 35
  - message{cooldown=4;m="&7<&lb>2<&fs>3<&rb> &6Drifter<&co> &cIt's been fun, and I hope it continues that way."} @PIR{r=50}
  - delay 35
  - message{cooldown=4;m="&7<&lb>3<&fs>3<&rb> &6Drifter<&co> &cEven if I don't know what will make it better, or I don't understand you."} @PIR{r=50}

drifter-message5:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>5<&rb> &6Drifter<&co> &cJust like Nijika's sister said, "I see you"; corny isn't it? I'm sorry."} @PIR{r=50} #Remove if going to live
  - delay 40
  - message{cooldown=4;m="&7<&lb>2<&fs>5<&rb> &6Drifter<&co> &cNever stop trying, and that goes for everything."} @PIR{r=50}
  - delay 40
  - message{cooldown=4;m="&7<&lb>3<&fs>5<&rb> &6Drifter<&co> &cThink of the 1st thing that came to mind I said "never stop trying"."} @PIR{r=50}
  - delay 40
  - message{cooldown=4;m="&7<&lb>4<&fs>5<&rb> &6Drifter<&co> &cEven if I do not understand you, you're not alone."} @PIR{r=50} #Remove if going to live
  - delay 40
  - message{cooldown=4;m="&7<&lb>5<&fs>5<&rb> &6Drifter<&co> &cI don't mean to save you, I just want you to feel you have a friend."} @PIR{r=50} #Remove if going to live

drifter-message6:
  Cooldown: 9999
  Skills:
  - message{cooldown=4;m="&7<&lb>1<&fs>7<&rb> &6Drifter<&co> &cI hope these feelings reach you."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>2<&fs>7<&rb> &6Drifter<&co> &cI hope you understand this, and then mock the cringiness on this thing I did."} @PIR{r=50} #Remove if going to live
  - delay 50
  - message{cooldown=4;m="&7<&lb>3<&fs>7<&rb> &6Drifter<&co> &cBecause that's what makes you, you."} @PIR{r=50} #Remove if going to live
  - delay 50
  - message{cooldown=4;m="&7<&lb>4<&fs>7<&rb> &6Drifter<&co> &cI hold all hope for you, for your future, for your ambitions"} @PIR{r=50} #Remove if going to live
  - delay 50
  - message{cooldown=4;m="&7<&lb>5<&fs>7<&rb> &6Drifter<&co> &cI hope for the best."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>6<&fs>7<&rb> &6Drifter<&co> &c&lI have the power to share your burden, the power to be your friend."} @PIR{r=50}
  - delay 50
  - message{cooldown=4;m="&7<&lb>7<&fs>7<&rb> &6Drifter<&co> &cBut...-"} @PIR{r=50}
  - delay 60
  - summon{mob=TheEnd;amount=1;noise=5;os=true} @selflocation



